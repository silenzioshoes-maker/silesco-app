<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SILESCO · Mesaje</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',sans-serif;background:#F4F1EA;min-height:100vh;color:#111111;display:flex;flex-direction:column;height:100vh;overflow:hidden}
.hdr{background:#111111;padding:14px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.hdr-back{background:none;border:none;cursor:pointer;padding:4px;display:flex;align-items:center}
.hdr-back svg{width:20px;height:20px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.hdr-title{font-family:'Playfair Display',serif;font-size:18px;color:#fff;font-weight:700;flex:1}
.hdr-badge{background:#9C3A2B;color:#fff;font-size:10px;font-weight:700;border-radius:10px;padding:2px 8px}
.hdr-new{background:rgba(176,141,87,.2);border:1px solid rgba(176,141,87,.4);border-radius:6px;padding:6px 12px;color:#B08D57;font-size:12px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif}

/* TABS */
.tabs{display:flex;background:#fff;border-bottom:1px solid #DDD7CE;flex-shrink:0}
.tab{flex:1;padding:11px;text-align:center;font-size:12px;font-weight:700;color:#5A5248;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.tab.active{color:#B08D57;border-bottom-color:#B08D57}

/* CONV LIST */
.conv-list{flex:1;overflow-y:auto;background:#fff}
.conv-item{padding:13px 16px;border-bottom:1px solid #EDE8DF;cursor:pointer;position:relative}
.conv-item.unread{background:#FFF9F0;border-left:3px solid #9C3A2B}
.conv-item.active-conv{background:#F6F0E5;border-left:3px solid #B08D57}
.conv-order{font-size:10px;font-weight:700;color:#8B6914;font-family:'Courier New',monospace;margin-bottom:2px}
.conv-client{font-size:14px;font-weight:700;color:#111111}
.conv-preview{font-size:12px;color:#5A5248;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:calc(100vw - 80px);margin-top:2px}
.conv-meta{display:flex;justify-content:space-between;margin-top:3px}
.conv-time{font-size:10px;color:#9E9890}
.conv-unread-badge{background:#9C3A2B;color:#fff;font-size:9px;font-weight:700;border-radius:8px;padding:1px 6px}
.conv-del-btn{position:absolute;top:12px;right:12px;background:#F5EAE8;border:1px solid rgba(156,58,43,.2);border-radius:5px;color:#9C3A2B;font-size:10px;font-weight:700;cursor:pointer;padding:3px 8px;font-family:'Inter',sans-serif;display:none}
.conv-item:active .conv-del-btn,.conv-item:hover .conv-del-btn{display:block}

/* CHAT VIEW */
.chat-view{flex:1;display:flex;flex-direction:column;overflow:hidden}
.chat-hdr{background:#fff;border-bottom:1px solid #DDD7CE;padding:12px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.chat-back{background:none;border:none;cursor:pointer;padding:4px}
.chat-back svg{width:18px;height:18px;stroke:#111;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.chat-info{flex:1}
.chat-order-no{font-size:10px;font-weight:700;color:#8B6914;font-family:'Courier New',monospace}
.chat-title{font-size:14px;font-weight:700;color:#111111}
.chat-sub{font-size:11px;color:#5A5248}
.chat-del{background:none;border:none;cursor:pointer;padding:6px}
.chat-del svg{width:16px;height:16px;stroke:#C8C0B8;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.chat-msgs{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:8px;background:#F4F1EA}
.bubble{max-width:80%;padding:10px 13px;border-radius:12px;position:relative}
.bubble.sent{align-self:flex-end;background:#111111;color:#fff;border-bottom-right-radius:3px}
.bubble.received{align-self:flex-start;background:#fff;border-bottom-left-radius:3px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.bubble-from{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px;opacity:.6}
.bubble-text{font-size:14px;line-height:1.5}
.bubble.sent .bubble-text{color:#fff}
.bubble-time{font-size:9px;opacity:.5;margin-top:4px}
.bubble-del{position:absolute;top:2px;right:4px;background:none;border:none;cursor:pointer;font-size:15px;opacity:0;transition:opacity .15s;font-family:'Inter',sans-serif;color:rgba(255,255,255,.6)}
.bubble:active .bubble-del,.bubble:hover .bubble-del{opacity:1}
.bubble.received .bubble-del{color:rgba(0,0,0,.3)}
.chat-compose{background:#fff;border-top:1px solid #DDD7CE;padding:10px 12px;display:flex;gap:8px;align-items:flex-end;flex-shrink:0}
.compose-input{flex:1;padding:10px 13px;border:1.5px solid #C8C0B8;border-radius:10px;font-size:14px;font-family:'Inter',sans-serif;color:#111111;outline:none;resize:none;min-height:42px;max-height:100px}
.compose-input:focus{border-color:#B08D57}
.compose-send{width:42px;height:42px;border-radius:10px;border:none;background:#111111;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.compose-send svg{width:16px;height:16px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:flex-end;justify-content:center}
.modal-overlay.show{display:flex}
.modal-box{background:#fff;border-radius:14px 14px 0 0;padding:22px 20px 36px;width:100%;max-width:480px}
.modal-title{font-family:'Playfair Display',serif;font-size:18px;color:#111111;margin-bottom:16px;font-weight:700}
.fld{margin-bottom:12px}
.fld label{display:block;font-size:10px;font-weight:700;color:#3A3530;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.fld select,.fld textarea{width:100%;padding:11px 13px;border:1.5px solid #C8C0B8;border-radius:8px;font-size:14px;font-family:'Inter',sans-serif;color:#111111;outline:none;background:#fff}
.fld textarea{resize:none;height:90px}
.btn-send{width:100%;padding:14px;border-radius:8px;border:none;background:#111111;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;margin-bottom:8px}
.btn-cancel{width:100%;padding:12px;border-radius:8px;border:1.5px solid #C8C0B8;background:#fff;color:#3A3530;font-size:13px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif}
.lov{display:none;position:fixed;inset:0;background:rgba(244,241,234,.96);z-index:999;align-items:center;justify-content:center;flex-direction:column;gap:14px}
.lov.show{display:flex}
.spinner{width:28px;height:28px;border:2px solid #DDD7CE;border-top-color:#B08D57;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.lov-text{font-size:13px;color:#2A2A2A;font-weight:600}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#111111;color:#fff;padding:10px 18px;border-radius:8px;font-size:12px;font-weight:700;white-space:nowrap;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="lov" id="lov"><div class="spinner"></div><div class="lov-text" id="lovText">Se încarcă...</div></div>
<div class="toast" id="toast"></div>

<!-- MODAL MESAJ NOU -->
<div class="modal-overlay" id="newMsgModal">
  <div class="modal-box">
    <div class="modal-title" id="newMsgTitle">Mesaj nou</div>
    <div class="fld">
      <label>Comandă asociată</label>
      <select id="nmOrder">
        <option value="">Mesaj general</option>
      </select>
    </div>
    <div class="fld">
      <label>Mesaj</label>
      <textarea id="nmText" placeholder="Scrie mesajul pentru management..."></textarea>
    </div>
    <button class="btn-send" onclick="sendNewMsg()">Trimite la Management</button>
    <button class="btn-cancel" onclick="closeNewMsg()">Anulează</button>
  </div>
</div>

<!-- HEADER -->
<div class="hdr">
  <button class="hdr-back" onclick="handleBack()">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <div class="hdr-title" id="hdrTitle">Mesaje</div>
  <span class="hdr-badge" id="hdrBadge" style="display:none">0</span>
  <button class="hdr-new" onclick="openNewMsg()">+ Nou</button>
</div>

<!-- TABS (vizibil în inbox) -->
<div class="tabs" id="tabsBar">
  <div class="tab active" onclick="setTab('all',this)">Toate</div>
  <div class="tab" onclick="setTab('unread',this)">Necitite</div>
  <div class="tab" onclick="setTab('sent',this)">Trimise</div>
</div>

<!-- INBOX -->
<div class="conv-list" id="inboxView"></div>

<!-- CHAT VIEW (ascuns inițial) -->
<div class="chat-view" id="chatView" style="display:none;flex:1;overflow:hidden">
  <div class="chat-hdr">
    <button class="chat-back" onclick="backToInbox()">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div class="chat-info">
      <div class="chat-order-no" id="chatOrderNo"></div>
      <div class="chat-title" id="chatTitle"></div>
      <div class="chat-sub" id="chatSub"></div>
    </div>
    <button class="chat-del" onclick="deleteCurrentConv()" title="Șterge conversația">
      <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg>
    </button>
  </div>
  <div class="chat-msgs" id="chatMsgs"></div>
  <div class="chat-compose">
    <textarea class="compose-input" id="replyInput" placeholder="Răspunde la management..." rows="1"
      oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,100)+'px'"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendReply();}"></textarea>
    <button class="compose-send" onclick="sendReply()">
      <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
</div>

<script>
const SURL='https://nprpwaxijtbjkxdhdxmq.supabase.co';
const SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5wcnB3YXhpanRiamt4ZGhkeG1xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5ODc3MzIsImV4cCI6MjA5NTU2MzczMn0.Ae8_C-3ke-KBTgIy9xcJZeDNFaR3Q9vTkoPxC6AbAg0';
const{createClient}=supabase;
const sb=createClient(SURL,SKEY);

let CU=null,CP=null,orders=[],conversations=[],filteredConvs=[];
let activeTab='all',activeConv=null;

window.addEventListener('DOMContentLoaded',async()=>{
  const{data:{session}}=await sb.auth.getSession();
  if(!session){window.location.href='/index.html';return;}
  CU=session.user;
  const{data:p}=await sb.from('user_profiles').select('full_name,role').eq('id',CU.id).single();
  CP=p;
  sb.auth.onAuthStateChange(ev=>{if(ev==='SIGNED_OUT')window.location.href='/index.html';});
  await Promise.all([loadMsgs(),loadOrders()]);
  // URL params
  const params=new URLSearchParams(window.location.search);
  const orderId=params.get('order');
  const orderNo=params.get('no');
  if(orderId){
    document.getElementById('hdrTitle').textContent='Mesaje · '+(orderNo?decodeURIComponent(orderNo):'');
    // Deschide conversația comenzii dacă există, altfel deschide modal nou
    const existing=conversations.find(c=>c.orderId===orderId);
    if(existing)openConv(existing);
    else{setTimeout(()=>{document.getElementById('nmOrder').value=orderId;openNewMsg(orderId,orderNo?decodeURIComponent(orderNo):'');},300);}
  }
});

function handleBack(){
  // Dacă suntem în chat → înapoi la inbox
  if(document.getElementById('chatView').style.display!=='none'){backToInbox();}
  else{window.location.href='/index.html';}
}

async function loadOrders(){
  const{data}=await sb.from('orders').select('id,order_no,clients!orders_client_id_fkey(name,company_name)').eq('agent_id',CU.id).order('created_at',{ascending:false}).limit(50);
  orders=data||[];
  const sel=document.getElementById('nmOrder');
  sel.innerHTML='<option value="">Mesaj general</option>';
  orders.forEach(o=>{const opt=document.createElement('option');opt.value=o.id;opt.textContent=(o.order_no||'—')+' · '+(o.clients?.company_name||o.clients?.name||'');sel.appendChild(opt);});
}

async function loadMsgs(){
  const{data}=await sb.from('internal_messages')
    .select(`id,from_user_id,to_department,order_id,message,subject,priority,is_read,reply,replied_at,created_at,parent_id,
      user_profiles!internal_messages_from_user_id_fkey(full_name,role),
      orders(order_no,clients!orders_client_id_fkey(name,company_name))`)
    .or(`to_department.eq.agent,from_user_id.eq.${CU.id}`)
    .is('parent_id',null)
    .order('created_at',{ascending:false}).limit(60);
  const msgs=data||[];
  // Grupează pe order_id
  const byOrder={};const general=[];
  msgs.forEach(m=>{
    if(m.order_id){if(!byOrder[m.order_id])byOrder[m.order_id]=[];byOrder[m.order_id].push(m);}
    else general.push(m);
  });
  conversations=[];
  Object.entries(byOrder).forEach(([orderId,ms])=>{
    const latest=ms[0];
    const unread=ms.filter(m=>!m.is_read&&m.from_user_id!==CU.id).length;
    conversations.push({type:'order',orderId,orderNo:latest.orders?.order_no||'—',client:latest.orders?.clients?.company_name||latest.orders?.clients?.name||'—',lastMsg:latest.message,lastTime:latest.created_at,unread,msgs:ms});
  });
  general.forEach(m=>{
    conversations.push({type:'general',id:m.id,subject:m.subject||m.message.slice(0,50),lastMsg:m.message,lastTime:m.created_at,unread:(!m.is_read&&m.from_user_id!==CU.id)?1:0,isMine:m.from_user_id===CU.id});
  });
  conversations.sort((a,b)=>new Date(b.lastTime)-new Date(a.lastTime));
  const unread=conversations.reduce((s,c)=>s+c.unread,0);
  const b=document.getElementById('hdrBadge');
  if(unread>0){b.style.display='inline';b.textContent=unread;}else{b.style.display='none';}
  applyTab();
}

function setTab(t,el){activeTab=t;document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));el.classList.add('active');applyTab();}
function applyTab(){
  if(activeTab==='all')filteredConvs=[...conversations];
  else if(activeTab==='unread')filteredConvs=conversations.filter(c=>c.unread>0);
  else filteredConvs=conversations.filter(c=>c.type==='general'&&c.isMine||c.type==='order'&&c.msgs?.some(m=>m.from_user_id===CU.id));
  renderInbox();
}

function renderInbox(){
  const el=document.getElementById('inboxView');
  if(!filteredConvs.length){el.innerHTML='<div style="padding:40px;text-align:center;color:#9E9890;font-size:13px;font-weight:500">Nicio conversație.</div>';return;}
  el.innerHTML=filteredConvs.map(c=>{
    const t=new Date(c.lastTime);
    const timeStr=t.toLocaleDateString('ro-RO')===new Date().toLocaleDateString('ro-RO')?t.toLocaleTimeString('ro-RO',{hour:'2-digit',minute:'2-digit'}):t.toLocaleDateString('ro-RO');
    const isActive=activeConv&&((c.type==='order'&&c.orderId===activeConv.orderId)||(c.type==='general'&&c.id===activeConv.id));
    if(c.type==='order'){
      return `<div class="conv-item${c.unread?' unread':''}${isActive?' active-conv':''}" onclick="openConv(${JSON.stringify(c).replace(/"/g,'&quot;')})">
        <div class="conv-order">${c.orderNo}</div>
        <div class="conv-client">${c.client}</div>
        <div class="conv-preview">${c.lastMsg}</div>
        <div class="conv-meta"><span style="font-size:9px;color:#5A5248;font-weight:600">Management</span><span class="conv-time">${timeStr}${c.unread?` <span class="conv-unread-badge">${c.unread}</span>`:''}</span></div>
        <button class="conv-del-btn" onclick="deleteOrderConv(event,'${c.orderId}')">Șterge</button>
      </div>`;
    }else{
      return `<div class="conv-item${c.unread?' unread':''}${isActive?' active-conv':''}" onclick="openConv(${JSON.stringify(c).replace(/"/g,'&quot;')})">
        <div class="conv-client">${c.isMine?'Tu → Management':'Management'}</div>
        <div class="conv-preview">${c.subject||c.lastMsg}</div>
        <div class="conv-meta"><span></span><span class="conv-time">${timeStr}${c.unread?` <span class="conv-unread-badge">${c.unread}</span>`:''}</span></div>
        <button class="conv-del-btn" onclick="deleteGeneralMsg(event,'${c.id}')">Șterge</button>
      </div>`;
    }
  }).join('');
}

async function openConv(c){
  if(typeof c==='string')c=JSON.parse(c);
  activeConv=c;
  showLov('Se încarcă...');
  let allThread=[];
  if(c.type==='order'){
    const{data:root}=await sb.from('internal_messages')
      .select(`id,from_user_id,to_department,message,priority,is_read,created_at,user_profiles!internal_messages_from_user_id_fkey(full_name,role)`)
      .eq('order_id',c.orderId).is('parent_id',null).order('created_at',{ascending:true});
    const rootIds=(root||[]).map(m=>m.id);
    let replies=[];
    if(rootIds.length){const{data:rep}=await sb.from('internal_messages').select(`id,from_user_id,message,created_at,parent_id,user_profiles!internal_messages_from_user_id_fkey(full_name,role)`).in('parent_id',rootIds).order('created_at',{ascending:true});replies=rep||[];}
    allThread=[...(root||[]),...replies].sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));
    // Marchează citite root-uri + reply-uri copil, ca bulina sa ajunga la 0
    await sb.from('internal_messages').update({is_read:true,read_at:new Date().toISOString()}).eq('order_id',c.orderId).eq('is_read',false).neq('from_user_id',CU.id);
    document.getElementById('chatOrderNo').textContent=c.orderNo;
    document.getElementById('chatTitle').textContent=c.client;
    document.getElementById('chatSub').textContent='Conversație cu Management';
  }else{
    const{data:root}=await sb.from('internal_messages').select(`id,from_user_id,message,subject,is_read,created_at,user_profiles!internal_messages_from_user_id_fkey(full_name,role)`).eq('id',c.id).single();
    const{data:replies}=await sb.from('internal_messages').select(`id,from_user_id,message,created_at,parent_id,user_profiles!internal_messages_from_user_id_fkey(full_name,role)`).eq('parent_id',c.id).order('created_at',{ascending:true});
    allThread=[root,...(replies||[])];
    // Marchează citit mesajul + reply-urile lui, ca bulina sa ajunga la 0
    await sb.from('internal_messages').update({is_read:true,read_at:new Date().toISOString()}).or(`id.eq.${c.id},parent_id.eq.${c.id}`).eq('is_read',false).neq('from_user_id',CU.id);
    document.getElementById('chatOrderNo').textContent='';
    document.getElementById('chatTitle').textContent=root.subject||root.message.slice(0,50);
    document.getElementById('chatSub').textContent=c.isMine?'Trimis la Management':'De la Management';
  }
  hideLov();
  // Render bubbles
  document.getElementById('chatMsgs').innerHTML=allThread.map(m=>{
    const isMine=m.from_user_id===CU.id;
    const sender=isMine?'Tu':m.user_profiles?.full_name||'Management';
    const t=new Date(m.created_at).toLocaleString('ro-RO');
    return `<div class="bubble ${isMine?'sent':'received'}">
      <button class="bubble-del" onclick="deleteSingleMsg('${m.id}')">×</button>
      <div class="bubble-from">${sender}</div>
      <div class="bubble-text">${m.message}</div>
      <div class="bubble-time">${t}</div>
    </div>`;
  }).join('');
  // Show chat
  document.getElementById('inboxView').style.display='none';
  document.getElementById('tabsBar').style.display='none';
  document.getElementById('chatView').style.display='flex';
  document.getElementById('replyInput').value='';
  setTimeout(()=>{const el=document.getElementById('chatMsgs');el.scrollTop=el.scrollHeight;},50);
  await loadMsgs();
}

function backToInbox(){
  document.getElementById('chatView').style.display='none';
  document.getElementById('inboxView').style.display='block';
  document.getElementById('tabsBar').style.display='flex';
  activeConv=null;renderInbox();
}

async function sendReply(){
  const text=document.getElementById('replyInput').value.trim();
  if(!text||!activeConv)return;
  showLov('Se trimite...');
  if(activeConv.type==='order'){
    await sb.from('internal_messages').insert({from_user_id:CU.id,to_department:'management',order_id:activeConv.orderId,message:text,priority:'normal',is_read:false});
  }else{
    await sb.from('internal_messages').insert({from_user_id:CU.id,to_department:'management',message:text,priority:'normal',is_read:false,parent_id:activeConv.id});
  }
  hideLov();document.getElementById('replyInput').value='';showToast('Trimis!');
  await openConv(activeConv);
}

function openNewMsg(orderId=null,orderNo=null){
  if(orderId)document.getElementById('nmOrder').value=orderId;
  document.getElementById('nmText').value='';
  document.getElementById('newMsgTitle').textContent=orderId?'Mesaj despre '+(orderNo||orderId):'Mesaj nou';
  document.getElementById('newMsgModal').classList.add('show');
}
function closeNewMsg(){document.getElementById('newMsgModal').classList.remove('show');}
async function sendNewMsg(){
  const orderId=document.getElementById('nmOrder').value||null;
  const text=document.getElementById('nmText').value.trim();
  if(!text){showToast('Scrie mesajul!');return;}
  showLov('Se trimite...');
  await sb.from('internal_messages').insert({from_user_id:CU.id,to_department:'management',order_id:orderId,message:text,priority:'normal',is_read:false});
  hideLov();closeNewMsg();showToast('Mesaj trimis la Management!');
  await loadMsgs();
  // Deschide conversația
  if(orderId){const c=conversations.find(x=>x.orderId===orderId);if(c)openConv(c);}
}

async function deleteSingleMsg(id){
  if(!confirm('Ștergi acest mesaj?'))return;
  showLov('Se șterge...');
  await sb.from('internal_messages').delete().eq('id',id);
  hideLov();showToast('Mesaj șters.');
  if(activeConv)await openConv(activeConv);
  await loadMsgs();
}
async function deleteCurrentConv(){
  if(!activeConv)return;
  if(!confirm('Ștergi toată conversația?'))return;
  showLov('Se șterge...');
  if(activeConv.type==='order'){await sb.from('internal_messages').delete().eq('order_id',activeConv.orderId);}
  else{await sb.from('internal_messages').delete().eq('parent_id',activeConv.id);await sb.from('internal_messages').delete().eq('id',activeConv.id);}
  hideLov();showToast('Conversație ștearsă.');backToInbox();await loadMsgs();
}
async function deleteOrderConv(e,orderId){e.stopPropagation();if(!confirm('Ștergi conversația?'))return;showLov('Se șterge...');await sb.from('internal_messages').delete().eq('order_id',orderId);hideLov();showToast('Șters.');await loadMsgs();}
async function deleteGeneralMsg(e,id){e.stopPropagation();if(!confirm('Ștergi mesajul?'))return;showLov('Se șterge...');await sb.from('internal_messages').delete().eq('parent_id',id);await sb.from('internal_messages').delete().eq('id',id);hideLov();showToast('Șters.');await loadMsgs();}
function showLov(t){document.getElementById('lovText').textContent=t||'Se încarcă...';document.getElementById('lov').classList.add('show');}
function hideLov(){document.getElementById('lov').classList.remove('show');}
function showToast(m){const e=document.getElementById('toast');e.textContent=m;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),2500);}
</script>
