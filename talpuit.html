<style>

/* ── MOBILE RESET ───────────────────────────────── */
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{font-size:16px}
body{font-family:Inter,system-ui,sans-serif;background:#F4F1EA;color:#111;min-height:100vh;-webkit-text-size-adjust:100%}

/* ── HEADER ─────────────────────────────────────── */
.hdr{background:#111;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}
.hdr-brand{font-size:13px;color:rgba(255,255,255,.6);letter-spacing:2px;text-transform:uppercase;margin-bottom:2px}
.hdr-title{font-size:20px;color:#fff;font-weight:800;font-family:Inter,sans-serif}
.hdr-ws{font-size:13px;color:#B08D57;font-weight:700;margin-top:2px}
.hdr-reload{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:8px;padding:10px 16px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:Inter,sans-serif;min-height:44px}

/* ── CARDS ──────────────────────────────────────── */
.content{padding:12px;max-width:640px;margin:0 auto}
.card{background:#fff;border:1px solid #DDD7CE;border-radius:12px;margin-bottom:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.card-header{padding:16px}
.order-no{font-size:13px;font-family:monospace;color:#333333;margin-bottom:4px;letter-spacing:.5px}
.client{font-size:20px;color:#111;font-weight:800;margin-bottom:4px;font-family:Inter,sans-serif;line-height:1.2}
.deadline{font-size:13px;color:#333333;font-weight:500}

/* ── ART ROW ────────────────────────────────────── */
.art-row{padding:16px;border-top:1px solid #EDE8DF;display:flex;flex-direction:column;gap:12px}
.art-info{}
.art-name{font-size:16px;font-weight:800;color:#111}
.art-color{font-size:14px;color:#333333;margin-top:3px;font-weight:500}
.art-total{font-size:15px;font-weight:700;color:#1E4A2E;margin-top:4px}
.pontaj{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.pchip{background:#F4F1EA;border:1px solid #C8C0B8;border-radius:6px;padding:5px 10px;font-size:13px;font-weight:700;color:#111;font-family:monospace}
.art-status{display:flex;align-items:center}

/* ── BUTOANE PRINCIPALE ─────────────────────────── */
.btn-done{width:100%;padding:16px;border-radius:10px;border:none;background:#1E4A2E;color:#fff;font-size:16px;font-weight:700;cursor:pointer;font-family:Inter,sans-serif;min-height:52px;letter-spacing:.3px}
.btn-done:active{background:#163a22}
.btn-done:disabled{background:#C8C0B8;cursor:not-allowed}
.status-done{display:inline-block;font-size:13px;font-weight:700;color:#1E4A2E;background:#EAF0EC;padding:8px 14px;border-radius:8px;border:1px solid #C8DEC8}

/* ── CARD FOOTER ────────────────────────────────── */
.card-footer{padding:14px 16px;background:#EAF0EC;border-top:1px solid #C8DEC8}
.card-footer span{font-size:14px;font-weight:700;color:#1E4A2E}

/* ── EMPTY STATE ────────────────────────────────── */
.empty{text-align:center;padding:60px 20px;color:#444444}
.empty svg{width:48px;height:48px;stroke:#DDD7CE;fill:none;stroke-width:1.5;margin:0 auto 20px;display:block}
.empty h3{font-size:18px;font-weight:700;color:#111;margin-bottom:8px}
.empty p{font-size:14px;color:#333333}

/* ── LOADING ────────────────────────────────────── */
.lov{display:none;position:fixed;inset:0;background:rgba(244,241,234,.96);z-index:999;align-items:center;justify-content:center;flex-direction:column;gap:16px}
.lov.show{display:flex}
.spinner{width:36px;height:36px;border:3px solid #DDD7CE;border-top-color:#B08D57;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.lov-text{font-size:15px;color:#111;font-weight:700;font-family:Inter,sans-serif}

/* ── TOAST ──────────────────────────────────────── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#111;color:#fff;padding:14px 22px;border-radius:10px;font-size:14px;font-weight:700;white-space:nowrap;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;max-width:90vw;text-align:center}
.toast.show{opacity:1}

/* ── INVALID ────────────────────────────────────── */
.invalid{text-align:center;padding:60px 20px}
.invalid h2{font-size:22px;color:#7A2418;margin-bottom:12px;font-weight:800}
.invalid p{font-size:15px;color:#333333}

/* ── ISTORIC ────────────────────────────────────── */

<script>

async function loadMateriale(){
  const[{data:t},{data:b}]=await Promise.all([
    sb.from('talpi').select('id,cod,name,stoc,min_alert,min_alert_sz').order('cod'),
    sb.from('branturi').select('id,cod,nume,stoc,min_alert_sz').order('cod'),
  ]);
  allTalpi=t||[];allBranturi=b||[];
}

function setTab(t){
  ['receptie','lansat','stoc'].forEach(x=>{
    document.getElementById('view'+x.charAt(0).toUpperCase()+x.slice(1)).style.display='none';
    document.getElementById('tab_'+x).classList.remove('active');
  });
  document.getElementById('view'+t.charAt(0).toUpperCase()+t.slice(1)).style.display='block';
  document.getElementById('tab_'+t).classList.add('active');
  if(t==='stoc')renderStoc();
}

function getModName(l){
  return l.products?.code?'Art. '+l.products.code:l.free_model||(l.notes?.match(/\[([^\]]+)\]/)?.[1]||l.color)||'—';
}

function renderPontaj(ponytage){
  if(!ponytage)return '';
  return Object.entries(ponytage).filter(([,q])=>q>0)
    .map(([s,q])=>`<span class="pchip">${s}×${q}</span>`).join('');
}

function groupByOrder(lines){
  const byOrder={};
  lines.forEach(l=>{
    const oid=l.order_id;
    if(!byOrder[oid])byOrder[oid]={order:l.orders,lines:[]};
    byOrder[oid].lines.push(l);
  });
  return Object.values(byOrder);
}

async function loadAll(){
  showLov('Se încarcă...');
  const[{data:lines},{data:manual}]=await Promise.all([
    sb.from('order_lines')
      .select('id,product_id,free_model,color,ponytage,total_pairs,notes,production_status,workshop,order_id,sort_order,talpa_id,brant_id,products(code,name)')
      .in('production_status',['cusut_gata','pregatit_lansat','in_talpuit','gata'])
      .order('sort_order',{ascending:true}),
    sb.from('productie_manual')
      .select('id,free_model,color,ponytage,total_pairs,production_status,notes,label,created_at')
      .in('production_status',['pregatit_lansat','in_talpuit','gata'])
      .order('created_at',{ascending:true})
  ]);

  const orderIds=[...new Set((lines||[]).map(l=>l.order_id).filter(Boolean))];
  let ordersMap={};
  if(orderIds.length){
    const{data:orders}=await sb.from('orders')
      .select('id,order_no,status,delivery_date,clients!orders_client_id_fkey(name,company_name)')
      .in('id',orderIds);
    (orders||[]).forEach(o=>ordersMap[o.id]=o);
  }
  (lines||[]).forEach(l=>l.orders=ordersMap[l.order_id]||null);
  (manual||[]).forEach(m=>{m._manual=true;m.orders={order_no:m.label||'Producție internă',clients:{company_name:'Producție internă',name:''}};});

  const cusutGata=(lines||[]).filter(l=>l.production_status==='cusut_gata');
  const pregatit=[
    ...(lines||[]).filter(l=>l.production_status==='pregatit_lansat'),
    ...(manual||[]).filter(m=>m.production_status==='pregatit_lansat')
  ];
  // Lista de jos = articolele lansate in talpuit (in_talpuit, + gata legacy) - informativ
  const lansat=[
    ...(lines||[]).filter(l=>l.production_status==='in_talpuit'||l.production_status==='gata'),
    ...(manual||[]).filter(m=>m.production_status==='in_talpuit'||m.production_status==='gata')
  ];

  document.getElementById('hdrBadge').textContent=pregatit.length+' de lansat';
  document.getElementById('stReceptie').textContent=cusutGata.length;
  document.getElementById('stLansat').textContent=pregatit.length;
  document.getElementById('stGata').textContent=lansat.reduce((s,l)=>s+(l.total_pairs||0),0);

  renderReceptie(cusutGata);
  renderPregatit(pregatit);
  renderLansat(lansat);
  hideLov();
}

function renderReceptie(lines){
  const el=document.getElementById('receptieList');
  const empty=document.getElementById('receptieEmpty');
  if(!lines.length){el.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';
  el.innerHTML=groupByOrder(lines).map((g,gi)=>{
    const o=g.order||{};
    const cl=o.clients?.company_name||o.clients?.name||'—';
    const dd=o.delivery_date?new Date(o.delivery_date).toLocaleDateString('ro-RO'):'—';
    return `<div class="cmd-card">
      <div class="cmd-header" onclick="togCmd('rec_${gi}','recarr_${gi}')">
        <div style="flex:1;min-width:0">
          <div class="cmd-no">${o.order_no||'—'}</div>
          <div class="cmd-client">${cl}</div>
          <div class="cmd-meta">Livrare: ${dd}</div>
        </div>
        <div class="cmd-progress"><div class="cmd-prog-num" style="color:#2F4A63">${g.lines.length}</div><div class="cmd-prog-label">art.</div></div>
        <svg class="cmd-arrow" id="recarr_${gi}" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="cmd-body" id="rec_${gi}">
        ${g.lines.map(l=>`
          <div class="art-row" style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px">
            <div style="flex:1">
              <div class="art-name">${getModName(l)} · ${l.color||'—'}</div>
              <div class="art-pairs">${l.total_pairs} per. · ${l.workshop||'intern'}</div>
              <div class="pontaj">${renderPontaj(l.ponytage)}</div>
            </div>
            <button class="btn-receptie" onclick="markReceptionat('${l.id}')">Recepționat ✓</button>
          </div>`).join('')}
      </div>
    </div>`;
  }).join('');
}

function renderLansat(lines){

  const label=document.getElementById('lansatInfoLabel');
  if(!lines.length){el.innerHTML='';if(label)label.style.display='none';return;}
  if(label){label.style.display='block';label.textContent='Lansate in talpuit (informativ)';}
  el.innerHTML=groupByOrder(lines).map((g,gi)=>{
    const o=g.order||{};
    const cl=o.clients?.company_name||o.clients?.name||'—';
    const dd=o.delivery_date?new Date(o.delivery_date).toLocaleDateString('ro-RO'):'—';
    return `<div class="cmd-card">
      <div class="cmd-header" onclick="togCmd('lan_${gi}','lanarr_${gi}')">
        <div style="flex:1;min-width:0">
          <div class="cmd-no">${o.order_no||'—'}</div>
          <div class="cmd-client">${cl}</div>
          <div class="cmd-meta">Livrare: ${dd}</div>
        </div>
        <div class="cmd-progress"><div class="cmd-prog-num" style="color:#1E4A2E">${g.lines.length}</div><div class="cmd-prog-label">art.</div></div>
        <svg class="cmd-arrow" id="lanarr_${gi}" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="cmd-body" id="lan_${gi}">
        ${g.lines.map(l=>{
          const talpa=allTalpi.find(t=>t.id===l.talpa_id);
          const brant=allBranturi.find(t=>t.id===l.brant_id);
          return `<div class="art-row">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px">
              <div style="flex:1">
                <div class="art-name">${getModName(l)} · ${l.color||'—'}</div>
                <div class="art-pairs">${l.total_pairs} per. · ${l.workshop||'intern'}</div>
                ${talpa?`<div style="font-size:13px;color:#333333;margin-top:2px">Talpă: <strong>${talpa.cod}</strong>${brant?' · Branț: <strong>'+brant.cod+'</strong>':''}</div>`:''}
                <div class="pontaj">${renderPontaj(l.ponytage)}</div>
              </div>
              <span style="flex-shrink:0;font-size:13px;font-weight:700;padding:3px 10px;border-radius:4px;background:#EAF0EC;color:#1E4A2E">Lansat ✓</span>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');
}

function renderStoc(){
  // talpi: nameKey='name', branturi: nameKey='cod' (numele e stocat in cod)
  const renderMat=(items,nameKey,tip)=>{
    if(!items.length)return `<div style="font-size:14px;color:#444444;padding:10px 0;text-align:center">Niciun articol înregistrat</div>`;
    return items.map(t=>{
      const stoc=t.stoc||{};
      const entries=Object.entries(stoc).sort((a,b)=>parseInt(a[0])-parseInt(b[0]));
      const total=entries.reduce((s,[,q])=>s+(q||0),0);
      const minSz=t.min_alert_sz||{};
      const hasAlert=entries.some(([s,q])=>minSz[s]&&(q||0)<=minSz[s]);
      const displayName = tip==='branturi' ? (t.cod||'—') : (t.name ? t.cod+' — '+t.name : t.cod);
      return `<div class="stoc-card" style="${hasAlert?'border-color:#9C3A2B;':''}">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
          <div>
            <span style="font-family:Inter,sans-serif;font-size:15px;font-weight:700">${displayName}</span>
          </div>
          <div style="display:flex;align-items:center;gap:6px">
            ${hasAlert?'<span style="font-size:13px;font-weight:700;color:#9C3A2B">⚠ Stoc scăzut</span>':''}
            <span style="font-size:13px;font-weight:700;color:#1E4A2E;background:#EAF0EC;padding:2px 8px;border-radius:4px">${total} per.</span>
          </div>
        </div>
        ${entries.length?`
        <div style="display:flex;gap:0;border:1px solid #DDD7CE;border-radius:6px;overflow:hidden;margin-bottom:8px">
          ${entries.map(([s,q])=>{
            const isLow=minSz[s]&&(q||0)<=minSz[s];
            return `<div style="flex:1;text-align:center;border-right:1px solid #DDD7CE;min-width:36px">
              <div style="font-size:13px;font-weight:700;color:#333333;background:#F4F1EA;padding:3px 2px;border-bottom:1px solid #DDD7CE">${s}</div>
              <input type="number" min="0" value="${q||0}"
                onchange="updateStocMaterie('${t.id}','${tip}','${s}',this.value)"
                style="width:100%;padding:4px 2px;border:none;text-align:center;font-size:14px;font-weight:700;color:${isLow?'#9C3A2B':'#111111'};background:${isLow?'#FDF4F2':'#fff'};outline:none;font-family:Inter,sans-serif"/>
            </div>`;
          }).join('')}
        </div>
        <button onclick="saveStocMaterie('${t.id}','${tip}')" style="width:100%;padding:7px;border-radius:6px;border:none;background:#111111;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif">Salvează stoc</button>
        `:'<div style="font-size:13px;color:#444444;font-style:italic">Fără stoc înregistrat</div>'}
      </div>`;
    }).join('');
  };
  // FIX: branturi folosesc 'nume' ca nameKey
  document.getElementById('stocTalpiGrid').innerHTML=renderMat(allTalpi,'name','talpi');
  document.getElementById('stocBranturiGrid').innerHTML=renderMat(allBranturi,'cod','branturi');
}

const stocEdits={};
function updateStocMaterie(id,tip,sz,val){
  if(!stocEdits[id])stocEdits[id]={tip};
  stocEdits[id][sz]=parseInt(val)||0;
}

async function saveStocMaterie(id,tip){
  const arr=tip==='talpi'?allTalpi:allBranturi;
  const item=arr.find(t=>t.id===id);
  if(!item)return;
  const stocNou={...item.stoc||{}};
  Object.keys(stocNou).forEach(sz=>{
    const inp=document.querySelector(`input[onchange*="'${id}'"][onchange*="'${sz}'"]`);
    if(inp)stocNou[sz]=parseInt(inp.value)||0;
  });
  showLov('Se salvează...');
  await sb.from(tip).update({stoc:stocNou}).eq('id',id);
  item.stoc=stocNou;
  hideLov();showToast('Stoc salvat!');
  renderStoc();
}

// ── MODAL ADAUGĂ STOC ────────────────────────────────────
function openModal(tip){
  modalTip=tip;
  const isTalpi=tip==='talpi';
  document.getElementById('modalTitle').textContent=isTalpi?'Adaugă tălpi în stoc':'Adaugă brânturi în stoc';
  document.getElementById('modalSub').textContent='Articol existent = adaugă cantități · Articol nou = creează în sistem';
  document.getElementById('modalSelectLabel').textContent=isTalpi?'Tip talpă':'Tip branț';

  // Populează selectul — branturi folosesc 'cod' ca nume (campul 'nume' e gol)
  const arr=isTalpi?allTalpi:allBranturi;
  const sel=document.getElementById('modalSelect');
  // Opțiune articol nou + articole existente
  const optNou=`<option value="__nou__">+ Articol nou...</option>`;
  if(!arr.length){
    sel.innerHTML=optNou;
  }else{
    sel.innerHTML=optNou+arr.map(t=>{
      const label=isTalpi?(t.name?t.cod+' — '+t.name:t.cod):t.cod;
      return `<option value="${t.id}">${label}</option>`;
    }).join('');
  }
  sel.onchange=()=>updateModalSzGrid();

  // Generează grila de mărimi
  updateModalSzGrid();

  document.getElementById('modalBg').classList.add('show');
}

function updateModalSzGrid(){
  const sel=document.getElementById('modalSelect');
  const id=sel.value;
  const arr=modalTip==='talpi'?allTalpi:allBranturi;
  const item=arr.find(t=>t.id===id);
  const isNou=id==='__nou__';

  // Câmp cod pentru articol nou
  const extra=document.getElementById('modalExtraFields');
  if(extra){
    extra.innerHTML=isNou?`
      <div class="modal-fld" style="margin-bottom:14px">
        <label>Cod articol nou *</label>
        <input type="text" id="modalCodNou" placeholder="ex: 924, Colombo, Master..."
          style="width:100%;padding:11px 13px;border:1.5px solid #DDD7CE;border-radius:8px;font-size:15px;font-family:'Inter',sans-serif;color:#111111;outline:none"/>
      </div>`:'';
  }

  // Mărimi existente în stoc sau toate mărimile standard
  let marimi=MARIMI;
  if(!isNou&&item?.stoc&&Object.keys(item.stoc).length){
    marimi=Object.keys(item.stoc).sort((a,b)=>parseInt(a)-parseInt(b));
  }

  document.getElementById('modalSzGrid').innerHTML=marimi.map(sz=>`
    <div class="sz-inp">
      <span>${sz}</span>
      <input type="number" min="0" value="0" id="mSz_${sz}" placeholder="0"/>
    </div>`).join('');
}

async function saveModal(){
  const sel=document.getElementById('modalSelect');
  const id=sel.value;
  if(!id){showToast('Selectează tipul!');return;}

  // Citește cantitățile introduse
  const stocNou={};
  let totalAdaugat=0;
  document.querySelectorAll('#modalSzGrid input[id^="mSz_"]').forEach(inp=>{
    const sz=inp.id.replace('mSz_','');
    const qty=parseInt(inp.value)||0;
    if(qty>0){stocNou[sz]=qty;totalAdaugat+=qty;}
  });
  if(!totalAdaugat){showToast('Introdu cel puțin o cantitate!');return;}

  const btn=document.getElementById('modalSaveBtn');
  btn.disabled=true;
  showLov('Se salvează stocul...');

  if(id==='__nou__'){
    // Articol nou — citește codul
    const codInp=document.getElementById('modalCodNou');
    const cod=(codInp?.value||'').trim();
    if(!cod){hideLov();showToast('Introdu codul articolului!');btn.disabled=false;return;}
    const payload=modalTip==='talpi'
      ?{cod,name:cod,stoc:stocNou}
      :{cod,nume:null,stoc:stocNou};
    const{data:nou,error}=await sb.from(modalTip).insert(payload).select().single();
    hideLov();
    if(error){showToast('Eroare la creare!');btn.disabled=false;return;}
    if(modalTip==='talpi')allTalpi.push(nou);else allBranturi.push(nou);
    btn.disabled=false;closeModal();
    showToast(`✓ ${cod} creat cu ${totalAdaugat} perechi!`);
    renderStoc();
  }else{
    // Articol existent — adaugă la stocul curent
    const arr=modalTip==='talpi'?allTalpi:allBranturi;
    const item=arr.find(t=>t.id===id);
    if(!item){hideLov();btn.disabled=false;return;}
    const stocCurent={...item.stoc||{}};
    Object.entries(stocNou).forEach(([sz,q])=>{
      stocCurent[sz]=(parseInt(stocCurent[sz])||0)+q;
    });
    const{error}=await sb.from(modalTip).update({stoc:stocCurent}).eq('id',id);
    hideLov();
    if(error){showToast('Eroare la salvare!');btn.disabled=false;return;}
    item.stoc=stocCurent;
    btn.disabled=false;closeModal();
    showToast(`✓ +${totalAdaugat} perechi adăugate!`);
    renderStoc();
  }
}

function closeModal(){
  document.getElementById('modalBg').classList.remove('show');
}

// click pe fundal închide modalul
document.getElementById('modalBg')?.addEventListener('click',function(e){
  if(e.target===this)closeModal();
});

function togCmd(bodyId,arrowId){
  const b=document.getElementById(bodyId),a=document.getElementById(arrowId);
  const open=b.style.display==='block';
  b.style.display=open?'none':'block';
  if(a)a.style.transform=open?'rotate(0deg)':'rotate(180deg)';
}

async function markReceptionat(lineId){
  showLov('Se recepționează...');
  await sb.from('order_lines').update({production_status:'pregatit_lansat'}).eq('id',lineId);
  hideLov();showToast('Receptionat — pregatit de lansat!');
  await loadAll();
  setTab('lansat');
}

function renderPregatit(lines){
  const el=document.getElementById('pregatitList');
  const empty=document.getElementById('pregatitEmpty');
  if(!lines.length){el.innerHTML='';if(empty)empty.style.display='block';return;}
  if(empty)empty.style.display='none';
  el.innerHTML=lines.map(l=>{
    const o=l.orders||{};
    const cl=o.clients?.company_name||o.clients?.name||'STOC';
    const entries=l.ponytage?Object.entries(l.ponytage).filter(([,q])=>q>0):[];
    const pontajHtml=entries.map(([s,q])=>`<div class="pchip">${s}×${q}</div>`).join('');
    const mod=l.products?.code?'Art. '+l.products.code:l.free_model||'—';
    return `<div class="card">
      <div class="card-header">
        <div class="order-no">${o.order_no||'—'}</div>
        <div class="client">${cl}</div>
      </div>
      <div class="art-row">
        <div class="art-info">
          <div class="art-name">${mod}</div>
          <div class="art-color">${l.color||'—'}</div>
          <div class="art-total">${l.total_pairs} perechi</div>
          <div class="pontaj">${pontajHtml}</div>
        </div>
        <button class="btn-done" onclick="markLansat('${l.id}','${l.order_id||''}','${l._manual?'1':'0'}')">Lanseaza in talpuit</button>
      </div>
    </div>`;
  }).join('');
}

async function markLansat(lineId,orderId,isManual){
  showLov('Se lansează...');
  const table=isManual==='1'?'productie_manual':'order_lines';
  // 1. Lansare in talpuit -> status in_talpuit (apare in Productie 'in talpuit' + ambalat)
  await sb.from(table).update({production_status:'in_talpuit'}).eq('id',lineId);
  // 2. Scade stoc talpi/branturi consumate (doar linii reale de comanda)
  if(isManual!=='1'){
    const{data:line}=await sb.from('order_lines').select('talpa_id,brant_id,ponytage').eq('id',lineId).single();
    if(line){
      const pony=line.ponytage||{};
      if(line.talpa_id){
        const talpa=allTalpi.find(t=>t.id===line.talpa_id);
        if(talpa&&talpa.stoc){
          const stocNou={...talpa.stoc};
          Object.keys(pony).forEach(sz=>{const c=parseInt(pony[sz])||0;if(stocNou[sz]!==undefined)stocNou[sz]=Math.max(0,(parseInt(stocNou[sz])||0)-c);});
          await sb.from('talpi').update({stoc:stocNou}).eq('id',line.talpa_id);
          talpa.stoc=stocNou;
        }
      }
      if(line.brant_id){
        const brant=allBranturi.find(t=>t.id===line.brant_id);
        if(brant&&brant.stoc){
          const stocNou={...brant.stoc};
          Object.keys(pony).forEach(sz=>{const c=parseInt(pony[sz])||0;if(stocNou[sz]!==undefined)stocNou[sz]=Math.max(0,(parseInt(stocNou[sz])||0)-c);});
          await sb.from('branturi').update({stoc:stocNou}).eq('id',line.brant_id);
          brant.stoc=stocNou;
        }
      }
    }
  }
  hideLov();showToast('Lansat in talpuit!');
  await loadMateriale();
  await loadAll();
}

function markTalpuitFromBtn(btn){
  const lid=btn.dataset.lid;
  const oid=btn.dataset.oid;
  const tid=btn.dataset.tid;
  const bid=btn.dataset.bid;
  let pt={};
  try{pt=JSON.parse(btn.dataset.pt||'{}');}catch(e){}
  markTalpuit(lid,oid,tid,bid,pt);
}

async function markTalpuit(lineId,orderId,talpaId,brantId,ponytage){
  showLov('Se finalizează...');
  try{
    // 1. Marchează articolul ca gata
    const{error:lineErr}=await sb.from('order_lines').update({production_status:'gata'}).eq('id',lineId);
    if(lineErr){hideLov();showToast('Eroare: '+lineErr.message);return;}

    // 2. Scade stoc talpi
    if(talpaId){
      const talpa=allTalpi.find(t=>t.id===talpaId);
      if(talpa&&talpa.stoc){
        const stocNou={...talpa.stoc};
        Object.keys(ponytage||{}).forEach(sz=>{
          const inp=document.getElementById('pt_'+lineId+'_'+sz);
          const consum=inp?parseInt(inp.value)||0:(ponytage[sz]||0);
          if(stocNou[sz]!==undefined)stocNou[sz]=Math.max(0,(parseInt(stocNou[sz])||0)-consum);
        });
        await sb.from('talpi').update({stoc:stocNou}).eq('id',talpaId);
        talpa.stoc=stocNou;
      }
    }

    // 3. Scade stoc branturi
    if(brantId){
      const brant=allBranturi.find(t=>t.id===brantId);
      if(brant&&brant.stoc){
        const stocNou={...brant.stoc};
        Object.keys(ponytage||{}).forEach(sz=>{
          const inp=document.getElementById('pt_'+lineId+'_'+sz);
          const consum=inp?parseInt(inp.value)||0:(ponytage[sz]||0);
          if(stocNou[sz]!==undefined)stocNou[sz]=Math.max(0,(parseInt(stocNou[sz])||0)-consum);
        });
        await sb.from('branturi').update({stoc:stocNou}).eq('id',brantId);
        brant.stoc=stocNou;
      }
    }

    // 4. Verifică dacă toate articolele comenzii sunt gata
    const{data:remaining}=await sb.from('order_lines')
      .select('id,production_status').eq('order_id',orderId).neq('from_stock',true);
    const allGata=(remaining||[]).every(l=>l.production_status==='gata'||l.id===lineId);
    if(allGata){
      await sb.from('orders').update({status:'la_impachetat'}).eq('id',orderId);
      showToast('✓ Gata — comandă la ambalat!');
    }else{
      showToast('✓ Talpuit!');
    }
  }catch(e){
    showToast('Eroare: '+e.message);
  }
  hideLov();
  await loadMateriale();
  await loadAll();
}

function showLov(t){document.getElementById('lovText').textContent=t||'Se încarcă...';document.getElementById('lov').classList.add('show');}
function hideLov(){document.getElementById('lov').classList.remove('show');}
function showToast(m){const e=document.getElementById('toast');e.textContent=m;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),3000);}
</script>
