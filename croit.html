<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SILESCO · Croit</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',sans-serif;background:#F4F1EA;min-height:100vh;color:#1B1B1B}

/* ── HEADER negru luxury ── */
.hdr{background:#111111;padding:18px 20px 16px}
.hdr-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.hdr-brand{font-size:9px;color:rgba(255,255,255,.3);letter-spacing:2.5px;text-transform:uppercase;margin-bottom:4px}
.hdr-name{font-family:'Playfair Display',serif;font-size:22px;color:#fff;font-weight:700;line-height:1}
.hdr-right{text-align:right}
.hdr-stat{font-family:'Playfair Display',serif;font-size:26px;color:#B08D57;font-weight:700;line-height:1}
.hdr-stat-label{font-size:9px;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:1px;margin-top:2px}

/* Lot tabs */
.lot-tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;-webkit-overflow-scrolling:touch}
.lot-tab{flex-shrink:0;padding:8px 14px;border-radius:7px;border:1.5px solid rgba(255,255,255,.12);background:transparent;cursor:pointer;font-family:'Inter',sans-serif;text-align:left;transition:all .15s}
.lot-tab.active{border-color:#B08D57;background:rgba(176,141,87,.15)}
.lot-tab-no{font-size:11px;font-weight:700;color:rgba(255,255,255,.5);font-family:'Courier New',monospace;margin-bottom:2px}
.lot-tab.active .lot-tab-no{color:#B08D57}
.lot-tab-st{font-size:10px;color:rgba(255,255,255,.25)}
.lot-tab.active .lot-tab-st{color:rgba(255,255,255,.5)}

/* ── CONTENT ── */
.wrap{padding:14px 16px 100px}

/* ── CARDS ── */
.card{background:#fff;border:1px solid #DDD7CE;border-radius:10px;padding:16px;margin-bottom:10px}
.sec-label{font-size:9px;font-weight:700;color:#9E9890;text-transform:uppercase;letter-spacing:2px;margin-bottom:10px}

/* Info lot */
.lot-client{font-family:'Playfair Display',serif;font-size:22px;color:#1B1B1B;font-weight:700;line-height:1.1;margin-bottom:6px}
.lot-art{font-size:15px;color:#6E6A64;margin-bottom:4px}
.lot-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.lot-tag{padding:4px 12px;border-radius:5px;font-size:12px;font-weight:600}
.tag-gold{background:#F6F0E5;border:1px solid rgba(176,141,87,.3);color:#B08D57}
.tag-dark{background:#F4F1EA;border:1px solid #DDD7CE;color:#1B1B1B}
.tag-green{background:#EAF0EC;border:1px solid rgba(54,90,67,.2);color:#365A43}

/* Mărimi grid */
.sizes-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.size-cell{background:#F4F1EA;border:1px solid #DDD7CE;border-radius:8px;padding:10px 6px;text-align:center}
.size-nr{font-size:11px;color:#9E9890;font-weight:600;margin-bottom:4px;letter-spacing:.3px}
.size-qty{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;color:#1B1B1B;line-height:1}

/* Status bar */
.status-bar{border-radius:8px;padding:13px 16px;text-align:center;margin-bottom:10px}
.status-bar.idle{background:#F4F1EA;border:1px solid #DDD7CE}
.status-bar.working{background:#FAF3E0;border:1px solid rgba(176,137,43,.25)}
.status-bar.done{background:#EAF0EC;border:1px solid rgba(54,90,67,.2)}
.status-bar-text{font-size:14px;font-weight:700}
.status-bar.idle .status-bar-text{color:#9E9890}
.status-bar.working .status-bar-text{color:#B0892B}
.status-bar.done .status-bar-text{color:#365A43}

/* Chips probleme */
.chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{padding:8px 14px;border-radius:20px;border:1.5px solid #DDD7CE;background:#fff;color:#6E6A64;font-size:12px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;transition:all .12s;-webkit-tap-highlight-color:transparent}
.chip.active{border-color:#9C3A2B;background:#F5EAE8;color:#9C3A2B;font-weight:700}

/* Perechi extra */
.extra-row{display:flex;align-items:center;gap:10px}
.extra-label{font-size:13px;color:#6E6A64;flex:1}
.extra-controls{display:flex;align-items:center;gap:8px}
.extra-btn{width:36px;height:36px;border-radius:7px;border:1.5px solid #DDD7CE;background:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:'Inter',sans-serif;transition:all .12s}
.extra-btn.plus{border-color:#B08D57;background:#F6F0E5;color:#B08D57}
.extra-val{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:#1B1B1B;min-width:28px;text-align:center}

/* Butoane acțiune */
.action-btn{width:100%;padding:16px;border-radius:10px;border:none;font-size:16px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;margin-bottom:10px;letter-spacing:.2px;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .15s}
.action-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.ab-black{background:#111111;color:#fff}
.ab-black:hover{background:#2a2a2a}
.ab-green{background:#365A43;color:#fff}
.ab-green:hover{background:#2a4833}
.ab-red{background:transparent;border:1.5px solid #9C3A2B;color:#9C3A2B}
.ab-outline{background:transparent;border:1.5px solid #DDD7CE;color:#6E6A64}
.ab-gold{background:#F6F0E5;border:1.5px solid #B08D57;color:#B08D57}

/* Bottom nav */
.bnav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #DDD7CE;display:flex;padding:8px 0 20px;z-index:100}
.nb{flex:1;background:transparent;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 0;font-family:'Inter',sans-serif}
.nb svg{width:20px;height:20px;stroke:#C8C0B8;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.nb.active svg{stroke:#B08D57}
.nb-label{font-size:9px;font-weight:600;color:#C8C0B8;letter-spacing:.5px;text-transform:uppercase}
.nb.active .nb-label{color:#B08D57}

/* Loading */
.lov{display:none;position:fixed;inset:0;background:rgba(244,241,234,.95);z-index:999;align-items:center;justify-content:center;flex-direction:column;gap:14px}
.lov.show{display:flex}
.spinner{width:32px;height:32px;border:2px solid #DDD7CE;border-top-color:#B08D57;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.lov-text{font-size:12px;color:#6E6A64;font-weight:500}

/* Toast */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#111111;color:#fff;padding:10px 18px;border-radius:8px;font-size:12px;font-weight:600;white-space:nowrap;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}

/* Empty */
.empty-state{text-align:center;padding:60px 20px;color:#C8C0B8}
.empty-icon{font-size:40px;margin-bottom:12px}
.empty-text{font-size:13px;color:#9E9890;line-height:1.6}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:flex-end;justify-content:center}
.modal-overlay.show{display:flex}
.modal-box{background:#fff;border-radius:14px 14px 0 0;padding:24px 20px 36px;width:100%;max-width:480px;max-height:80vh;overflow-y:auto}
.modal-title{font-family:'Playfair Display',serif;font-size:18px;color:#1B1B1B;margin-bottom:4px;font-weight:700}
.modal-sub{font-size:12px;color:#9E9890;margin-bottom:20px}
.fld{margin-bottom:14px}
.fld label{display:block;font-size:10px;font-weight:700;color:#6E6A64;text-transform:uppercase;letter-spacing:1px;margin-bottom:7px}
.fld textarea{width:100%;padding:11px 13px;border:1.5px solid #DDD7CE;border-radius:7px;font-size:14px;font-family:'Inter',sans-serif;color:#1B1B1B;outline:none;resize:none;height:80px}
.fld textarea:focus{border-color:#9C3A2B}
</style>
</head>
<body>

<div class="lov" id="lov"><div class="spinner"></div><div class="lov-text" id="lovText">Se încarcă...</div></div>
<div class="toast" id="toast"></div>

<!-- MODAL PROBLEMĂ -->
<div class="modal-overlay" id="problemModal">
  <div class="modal-box">
    <div class="modal-title">Raportează problemă</div>
    <div class="modal-sub" id="problemModalSub"></div>
    <div class="fld">
      <label>Detalii problemă</label>
      <textarea id="problemText" placeholder="Descrie problema — ex: lipsă piele pentru 4 perechi nr. 42..."></textarea>
    </div>
    <button class="action-btn ab-red" onclick="confirmProblem()" style="margin-bottom:8px">
      <svg viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      Trimite la Management
    </button>
    <button class="action-btn ab-outline" onclick="closeProblemModal()">Anulează</button>
  </div>
</div>

<!-- HEADER -->
<div class="hdr" id="mainHdr">
  <div class="hdr-top">
    <div>
      <div class="hdr-brand">SILESCO · Croit</div>
      <div class="hdr-name" id="hdrName">—</div>
    </div>
    <div class="hdr-right">
      <div class="hdr-stat" id="hdrStat">0/0</div>
      <div class="hdr-stat-label">finalizate azi</div>
    </div>
  </div>
  <!-- Lot tabs -->
  <div class="lot-tabs" id="lotTabs"></div>
</div>

<!-- VIEWS -->
<div id="vLoturi" style="display:none">
  <div class="wrap">
    <!-- LOT INFO -->
    <div class="card" id="lotInfoCard" style="display:none">
      <div class="sec-label">Lot activ</div>
      <div class="lot-client" id="lotClient"></div>
      <div class="lot-art" id="lotArt"></div>
      <div class="lot-tags" id="lotTags"></div>
    </div>

    <!-- MĂRIMI -->
    <div class="card" id="lotSizesCard" style="display:none">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div class="sec-label" style="margin-bottom:0">Mărimi de tăiat</div>
        <div style="font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:#B08D57" id="lotTotalPairs"></div>
      </div>
      <div class="sizes-grid" id="sizesGrid"></div>

      <!-- Perechi extra -->
      <div id="extraSection" style="margin-top:14px;padding-top:14px;border-top:1px solid #EDE8DF;display:none">
        <div class="extra-row">
          <div class="extra-label">Perechi suplimentare</div>
          <div class="extra-controls">
            <button class="extra-btn" onclick="adjExtra(-1)">−</button>
            <span class="extra-val" id="extraVal">0</span>
            <button class="extra-btn plus" onclick="adjExtra(1)">+</button>
          </div>
        </div>
        <div id="extraNote" style="display:none;margin-top:8px;padding:7px 10px;background:#F6F0E5;border-radius:6px;font-size:11px;color:#B08D57"></div>
      </div>
    </div>

    <!-- STATUS -->
    <div class="status-bar idle" id="statusBar">
      <div class="status-bar-text" id="statusText">— Așteptare —</div>
    </div>

    <!-- CHIPS PROBLEME -->
    <div class="card" id="chipsCard" style="display:none">
      <div class="sec-label">Problemă rapidă</div>
      <div class="chips" id="chipsWrap"></div>
    </div>

    <!-- BUTOANE -->
    <div id="actionsWrap"></div>

    <!-- EMPTY -->
    <div class="empty-state" id="emptyState" style="display:none">
      <div class="empty-icon">✂️</div>
      <div class="empty-text">Nu ai loturi active.<br>Managementul va lansa loturi în curând.</div>
    </div>
  </div>
</div>

<div id="vIstoric" style="display:none">
  <div class="wrap">
    <div class="sec-label">Loturi finalizate azi</div>
    <div id="istoricList"></div>
  </div>
</div>

<!-- NAV -->
<div class="bnav">
  <button class="nb active" id="n_loturi" onclick="showV('loturi')">
    <svg viewBox="0 0 24 24"><path d="M6 9a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"/><path d="M6 15a3 3 0 1 0 0 6 3 3 0 0 0 0-6z"/><path d="M20 4 8.12 15.88M14.47 14.48 20 20M8.12 8.12 12 12"/></svg>
    <span class="nb-label">Loturi</span>
  </button>
  <button class="nb" id="n_istoric" onclick="showV('istoric')">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    <span class="nb-label">Istoric</span>
  </button>
  <button class="nb" onclick="doLogout()" style="flex:0.7">
    <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    <span class="nb-label">Ieși</span>
  </button>
</div>

<script>
const SURL='https://nprpwaxijtbjkxdhdxmq.supabase.co';
const SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5wcnB3YXhpanRiamt4ZGhkeG1xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5ODc3MzIsImV4cCI6MjA5NTU2MzczMn0.Ae8_C-3ke-KBTgIy9xcJZeDNFaR3Q9vTkoPxC6AbAg0';
const{createClient}=supabase;
const sb=createClient(SURL,SKEY);

let CU=null,CP=null;
let lots=[],activeLotIdx=0,extraPairs=0;
let activeChips=[],lotStatus='idle'; // idle | working | done
let doneTodayCount=0;

const CHIPS=['Lipsă piele','Lipsă talpă','Lipsă căptușeală','Defect FEȚE'];

// ── INIT ──────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded',async()=>{
  const{data:{session}}=await sb.auth.getSession();
  if(!session){window.location.href='/index.html';return;}
  CU=session.user;
  const{data:p}=await sb.from('user_profiles').select('full_name,role').eq('id',CU.id).single();
  CP=p;
  if(p?.role!=='croit'&&p?.role!=='management'){
    // Management poate vedea ecranul de croit pentru testare
  }
  document.getElementById('hdrName').textContent=p?.full_name||'Croitor';
  sb.auth.onAuthStateChange((ev)=>{if(ev==='SIGNED_OUT')window.location.href='/index.html';});
  await loadLots();
});

async function doLogout(){await sb.auth.signOut();}

// ── LOAD LOTURI ───────────────────────────────────────────────
async function loadLots(){
  showLov('Se încarcă loturile...');
  const{data,error}=await sb.from('production_lots')
    .select(`id,lot_no,stage,qty_planned,qty_done,has_issue,issue_notes,
      started_at,completed_at,created_at,order_line_id,
      orders(id,order_no,clients(name,company_name)),
      products(code,name),
      talpi(name)`)
    .in('stage',['nou','la_croit','fete_gata_cusut'])
    .order('created_at',{ascending:true});

  // Fetch order_lines separat
  if(data&&data.length){
    const lineIds=data.map(l=>l.order_line_id).filter(Boolean);
    if(lineIds.length){
      const{data:lines}=await sb.from('order_lines')
        .select('id,ponytage,color').in('id',lineIds);
      data.forEach(lot=>{
        lot.order_line_data=lines?.find(l=>l.id===lot.order_line_id)||null;
      });
    }
  }

  // Loturi finalizate azi pentru istoric
  const azi=new Date().toISOString().split('T')[0];
  const{data:done}=await sb.from('production_lots')
    .select(`id,lot_no,qty_planned,completed_at,orders(clients(name,company_name)),products(code)`)
    .eq('stage','fete_gata_cusut')
    .gte('completed_at',azi+'T00:00:00')
    .order('completed_at',{ascending:false});

  hideLov();
  lots=data||[];
  doneTodayCount=(done||[]).length;
  document.getElementById('hdrStat').textContent=doneTodayCount+'/'+(lots.length+doneTodayCount);
  document.getElementById('vLoturi').style.display='block';

  if(!lots.length){
    showEmptyState();
    return;
  }

  renderLotTabs();
  selectLot(0);
  renderIstoric(done||[]);
}

function showEmptyState(){
  document.getElementById('emptyState').style.display='block';
  document.getElementById('lotInfoCard').style.display='none';
  document.getElementById('lotSizesCard').style.display='none';
  document.getElementById('chipsCard').style.display='none';
  document.getElementById('statusBar').style.display='none';
  document.getElementById('actionsWrap').innerHTML='';
  document.getElementById('lotTabs').innerHTML='';
}

// ── TABS ──────────────────────────────────────────────────────
function renderLotTabs(){
  const tabs=document.getElementById('lotTabs');
  tabs.innerHTML=lots.map((l,i)=>{
    const stLabel=l.stage==='la_croit'?'La croit':l.stage==='fete_gata_cusut'?'Gata ✓':'Așteptare';
    return `<button class="lot-tab${i===activeLotIdx?' active':''}" onclick="selectLot(${i})">
      <div class="lot-tab-no">${l.lot_no||'—'}</div>
      <div class="lot-tab-st">${stLabel}</div>
    </button>`;
  }).join('');
}

function selectLot(i){
  activeLotIdx=i;
  extraPairs=0;
  activeChips=[];
  lotStatus=lots[i]?.stage==='fete_gata_cusut'?'done':lots[i]?.stage==='la_croit'?'working':'idle';
  renderLotTabs();
  renderActiveLot();
}

// ── RENDER LOT ACTIV ──────────────────────────────────────────
function renderActiveLot(){
  const lot=lots[activeLotIdx];
  if(!lot)return;

  document.getElementById('emptyState').style.display='none';
  document.getElementById('lotInfoCard').style.display='block';
  document.getElementById('lotSizesCard').style.display='block';
  document.getElementById('chipsCard').style.display=lotStatus!=='done'?'block':'none';
  document.getElementById('statusBar').style.display='block';

  // Info
  const cl=lot.orders?.clients?.company_name||lot.orders?.clients?.name||'—';
  document.getElementById('lotClient').textContent=cl;
  document.getElementById('lotArt').textContent='Art. '+(lot.products?.code||'—')+' · '+(lot.order_line_data?.color||'');

  // Tags
  const tags=[];
  tags.push(`<span class="lot-tag tag-gold">${(lot.qty_planned||0)+(extraPairs)} perechi</span>`);
  if(lot.talpi?.name) tags.push(`<span class="lot-tag tag-dark">Talpă: ${lot.talpi.name}</span>`);
  if(lot.has_issue) tags.push(`<span class="lot-tag" style="background:#F5EAE8;border:1px solid rgba(156,58,43,.2);color:#9C3A2B">⚠ Problemă</span>`);
  document.getElementById('lotTags').innerHTML=tags.join('');

  // Pontaj
  const pontaj=lot.order_line_data?.ponytage||{};
  const entries=Object.entries(pontaj);
  document.getElementById('lotTotalPairs').textContent=(lot.qty_planned||0)+(extraPairs)+' per.';
  document.getElementById('sizesGrid').innerHTML=entries.length
    ? entries.map(([sz,q])=>`
        <div class="size-cell">
          <div class="size-nr">Nr. ${sz}</div>
          <div class="size-qty">${q}</div>
        </div>`).join('')
    : '<div style="font-size:12px;color:#9E9890;padding:8px">Pontaj indisponibil</div>';

  // Extra perechi
  const extraSec=document.getElementById('extraSection');
  const extraNote=document.getElementById('extraNote');
  extraSec.style.display=lotStatus==='working'?'block':'none';
  document.getElementById('extraVal').textContent=extraPairs;
  if(extraPairs>0){
    extraNote.style.display='block';
    extraNote.textContent='+'+extraPairs+' perechi suplimentare adăugate';
  }else{extraNote.style.display='none';}

  // Status bar
  const bar=document.getElementById('statusBar');
  const txt=document.getElementById('statusText');
  bar.className='status-bar';
  if(lotStatus==='idle'){bar.classList.add('idle');txt.textContent='— Așteptare — apasă Începe pentru a prelua lotul';}
  else if(lotStatus==='working'){bar.classList.add('working');txt.textContent='În lucru acum';}
  else if(lotStatus==='done'){bar.classList.add('done');txt.textContent='FEȚE gata · Management notificat ✓';}

  // Chips
  if(lotStatus!=='done'){
    document.getElementById('chipsWrap').innerHTML=CHIPS.map(c=>`
      <button class="chip${activeChips.includes(c)?' active':''}" onclick="toggleChip('${c}')">${c}</button>`).join('');
  }

  // Acțiuni
  renderActions(lot);
}

function renderActions(lot){
  const wrap=document.getElementById('actionsWrap');
  if(lotStatus==='idle'){
    wrap.innerHTML=`
      <button class="action-btn ab-green" onclick="startLot()">
        <svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        Începe lucrul
      </button>`;
  }else if(lotStatus==='working'){
    wrap.innerHTML=`
      <button class="action-btn ab-green" onclick="finishLot()">
        <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        FEȚE gata — Finalizat
      </button>
      <button class="action-btn ab-gold" onclick="openProblemModal()">
        <svg viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        Raportează problemă
      </button>`;
  }else if(lotStatus==='done'){
    wrap.innerHTML=`
      <div style="padding:14px 16px;background:#EAF0EC;border:1px solid rgba(54,90,67,.2);border-radius:10px;text-align:center;margin-bottom:10px">
        <div style="font-size:14px;font-weight:700;color:#365A43;margin-bottom:4px">Finalizat cu succes</div>
        <div style="font-size:11px;color:#6E6A64">${lot.qty_planned} perechi trimise la cusut extern</div>
      </div>
      ${lots.length>1?`<button class="action-btn ab-outline" onclick="selectLot(${activeLotIdx===lots.length-1?0:activeLotIdx+1})">
        <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
        Lot următor
      </button>`:''}`;
  }
}

// ── ACȚIUNI LOT ───────────────────────────────────────────────
async function startLot(){
  const lot=lots[activeLotIdx];
  if(!lot)return;
  showLov('Se actualizează...');
  const{error}=await sb.from('production_lots').update({
    stage:'la_croit',
    started_at:new Date().toISOString(),
  }).eq('id',lot.id);
  hideLov();
  if(error){showToast('Eroare: '+error.message);return;}
  lots[activeLotIdx].stage='la_croit';
  lotStatus='working';
  renderActiveLot();
  showToast('Lot preluat — poți începe!');
}

async function finishLot(){
  const lot=lots[activeLotIdx];
  if(!lot)return;
  showLov('Se finalizează lotul...');

  // Notă chips active
  const chipsNote=activeChips.length?'Probleme raportate: '+activeChips.join(', '):'';
  const totalReal=(lot.qty_planned||0)+extraPairs;

  await sb.from('production_lots').update({
    stage:'fete_gata_cusut',
    qty_done:totalReal,
    completed_at:new Date().toISOString(),
    has_issue:activeChips.length>0,
    issue_notes:chipsNote||null,
  }).eq('id',lot.id);

  // Dacă perechi extra → salvează în audit
  if(extraPairs>0){
    await sb.from('audit_log').insert({
      table_name:'production_lots',record_id:lot.id,action:'update',
      new_data:{action:'Perechi suplimentare adăugate: +'+extraPairs,operator:CP?.full_name||'Croitor'},
      done_by:CU.id,
    });
  }

  hideLov();
  lots[activeLotIdx].stage='fete_gata_cusut';
  lots[activeLotIdx].qty_done=totalReal;
  lotStatus='done';
  doneTodayCount++;
  document.getElementById('hdrStat').textContent=doneTodayCount+'/'+(lots.length);
  renderActiveLot();
  showToast('FEȚE gata! Management notificat.');
}

// ── EXTRA PERECHI ─────────────────────────────────────────────
function adjExtra(d){
  extraPairs=Math.max(0,extraPairs+d);
  document.getElementById('extraVal').textContent=extraPairs;
  const lot=lots[activeLotIdx];
  document.getElementById('lotTotalPairs').textContent=((lot?.qty_planned||0)+extraPairs)+' per.';
  const note=document.getElementById('extraNote');
  if(extraPairs>0){note.style.display='block';note.textContent='+'+extraPairs+' perechi suplimentare adăugate';}
  else{note.style.display='none';}
  // Update tags
  const tagsEl=document.getElementById('lotTags');
  const tags=tagsEl.innerHTML.replace(/class="lot-tag tag-gold">[^<]+</,'class="lot-tag tag-gold">'+((lot?.qty_planned||0)+extraPairs)+' perechi<');
  tagsEl.innerHTML=tags;
}

// ── CHIPS ─────────────────────────────────────────────────────
function toggleChip(chip){
  if(activeChips.includes(chip)){activeChips=activeChips.filter(c=>c!==chip);}
  else{activeChips.push(chip);}
  document.getElementById('chipsWrap').innerHTML=CHIPS.map(c=>`
    <button class="chip${activeChips.includes(c)?' active':''}" onclick="toggleChip('${c}')">${c}</button>`).join('');
}

// ── MODAL PROBLEMĂ ────────────────────────────────────────────
function openProblemModal(){
  const lot=lots[activeLotIdx];
  document.getElementById('problemModalSub').textContent=(lot?.lot_no||'—')+' · Art. '+(lot?.products?.code||'—');
  document.getElementById('problemText').value=activeChips.length?activeChips.join(', '):'';
  document.getElementById('problemModal').classList.add('show');
}
function closeProblemModal(){document.getElementById('problemModal').classList.remove('show');}

async function confirmProblem(){
  const lot=lots[activeLotIdx];
  const text=document.getElementById('problemText').value.trim();
  if(!text){showToast('Descrie problema!');return;}
  showLov('Se trimite...');
  await sb.from('production_lots').update({
    has_issue:true,
    issue_notes:text,
  }).eq('id',lot.id);
  // Mesaj intern către management
  await sb.from('internal_messages').insert({
    from_user_id:CU.id,
    to_department:'management',
    order_id:lot.orders?.id||null,
    message:'Problemă lot '+lot.lot_no+': '+text,
    priority:activeChips.length?'urgent':'normal',
  }).single();
  hideLov();
  closeProblemModal();
  lots[activeLotIdx].has_issue=true;
  renderActiveLot();
  showToast('Problemă trimisă la management!');
}

// ── ISTORIC ───────────────────────────────────────────────────
function renderIstoric(done){
  const el=document.getElementById('istoricList');
  if(!done.length){
    el.innerHTML='<div class="empty-state" style="padding:40px 0"><div class="empty-icon">📋</div><div class="empty-text">Niciun lot finalizat azi.</div></div>';
    return;
  }
  el.innerHTML=done.map(l=>`
    <div class="card" style="margin-bottom:8px;display:flex;justify-content:space-between;align-items:center">
      <div>
        <div style="font-size:10px;font-family:'Courier New',monospace;color:#C8C0B8;margin-bottom:3px">${l.lot_no||'—'}</div>
        <div style="font-size:14px;font-weight:700;color:#1B1B1B">${l.orders?.clients?.company_name||l.orders?.clients?.name||'—'}</div>
        <div style="font-size:12px;color:#9E9890;margin-top:2px">Art. ${l.products?.code||'—'} · ${l.qty_planned||0} per.</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:11px;color:#365A43;font-weight:600">Gata ✓</div>
        <div style="font-size:10px;color:#C8C0B8;margin-top:2px">${l.completed_at?new Date(l.completed_at).toLocaleTimeString('ro-RO',{hour:'2-digit',minute:'2-digit'}):''}</div>
      </div>
    </div>`).join('');
}

// ── VIEWS ─────────────────────────────────────────────────────
function showV(name){
  document.getElementById('vLoturi').style.display=name==='loturi'?'block':'none';
  document.getElementById('vIstoric').style.display=name==='istoric'?'block':'none';
  document.getElementById('n_loturi').classList.toggle('active',name==='loturi');
  document.getElementById('n_istoric').classList.toggle('active',name==='istoric');
}

// ── UTILS ─────────────────────────────────────────────────────
function showLov(t){document.getElementById('lovText').textContent=t||'Se încarcă...';document.getElementById('lov').classList.add('show');}
function hideLov(){document.getElementById('lov').classList.remove('show');}
function showToast(m){const e=document.getElementById('toast');e.textContent=m;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),2500);}
</script>
</body>
</html>
