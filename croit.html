<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SILESCO · Croit</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',sans-serif;background:#F4F1EA;min-height:100vh;color:#111111}
.hdr{background:#111111;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:50}
.hdr-left .hdr-brand{font-size:9px;color:rgba(255,255,255,.3);letter-spacing:2.5px;text-transform:uppercase;margin-bottom:3px}
.hdr-left .hdr-title{font-family:'Playfair Display',serif;font-size:20px;color:#fff;font-weight:700}
.hdr-right{display:flex;align-items:center;gap:8px}
.hdr-badge{background:rgba(176,141,87,.15);border:1px solid rgba(176,141,87,.3);border-radius:20px;padding:4px 12px;font-size:11px;color:#B08D57;font-weight:600}
.msg-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:8px;padding:6px 10px;cursor:pointer;position:relative;display:flex;align-items:center;gap:5px;color:#fff;font-size:11px;font-weight:700;font-family:'Inter',sans-serif}
.msg-btn svg{width:14px;height:14px;stroke:#fff;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.msg-badge{background:#9C3A2B;color:#fff;font-size:9px;font-weight:700;border-radius:8px;padding:1px 5px;min-width:14px;text-align:center}
.logout-btn{background:none;border:none;cursor:pointer;padding:6px}
.logout-btn svg{width:16px;height:16px;stroke:rgba(255,255,255,.4);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.tabs{background:#fff;border-bottom:1px solid #DDD7CE;display:flex;position:sticky;top:57px;z-index:40}
.tab{flex:1;padding:12px;text-align:center;font-size:12px;font-weight:700;color:#5A5248;cursor:pointer;border-bottom:2px solid transparent}
.tab.active{color:#111111;border-bottom-color:#111111}
.wrap{padding:12px 14px 80px}

/* COMANDA CARD */
.cmd-card{background:#fff;border:1px solid #DDD7CE;border-radius:10px;margin-bottom:10px;overflow:hidden}
.cmd-header{padding:14px 16px;cursor:pointer;display:flex;gap:10px;align-items:flex-start}
.cmd-header:active{background:#F4F1EA}
.cmd-main{flex:1;min-width:0}
.cmd-no{font-size:10px;font-family:'Courier New',monospace;color:#5A5248;margin-bottom:3px}
.cmd-client{font-family:'Playfair Display',serif;font-size:17px;color:#111111;margin-bottom:5px}
.cmd-preview{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px}
.art-chip{font-size:10px;color:#3A3530;background:#F4F1EA;border:1px solid #DDD7CE;padding:2px 8px;border-radius:4px;white-space:nowrap}
.cmd-meta{font-size:11px;color:#5A5248}
.cmd-progress{text-align:right;flex-shrink:0}
.cmd-prog-num{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;line-height:1}
.cmd-prog-label{font-size:9px;color:#5A5248;text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.cmd-arrow{width:14px;height:14px;stroke:#5A5248;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;transition:transform .2s;flex-shrink:0;margin-top:6px}

/* BODY */
.cmd-body{display:none;border-top:1px solid #EDE8DF}

/* ARTICOL */
.art-row{padding:14px 16px;border-bottom:1px solid #EDE8DF}
.art-row.done{background:#F0FBF4}
.art-row.has-problem{background:#FFF8F8}
.art-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.art-name{font-size:14px;font-weight:700;color:#111111}
.art-color{font-size:12px;color:#5A5248}
.art-planned{font-size:11px;color:#9E9890;margin-top:2px}

/* PONTAJ EDITABIL */
.pontaj-edit{margin:10px 0}
.pontaj-edit-label{font-size:9px;font-weight:700;color:#5A5248;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px}
.pontaj-grid{display:flex;flex-wrap:wrap;gap:6px}
.sz-cell{background:#F4F1EA;border:1.5px solid #DDD7CE;border-radius:8px;padding:8px 6px;text-align:center;min-width:56px}
.sz-cell.modified{background:#FFF3CD;border-color:#B0892B}
.sz-cell.zero{background:#F5EAE8;border-color:rgba(156,58,43,.3);opacity:.7}
.sz-nr{font-size:10px;color:#5A5248;font-weight:700;margin-bottom:4px}
.sz-planned{font-size:9px;color:#9E9890;margin-bottom:3px}
.sz-controls{display:flex;align-items:center;gap:3px;justify-content:center}
.sz-btn{width:24px;height:24px;border-radius:5px;border:1.5px solid #B08D57;background:#F6F0E5;color:#B08D57;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:'Inter',sans-serif}
.sz-val{font-size:16px;font-weight:700;color:#111111;min-width:18px;text-align:center;font-family:'Playfair Display',serif}

/* ACTIONS */
.art-actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.btn-done{padding:9px 16px;border-radius:7px;border:none;background:#1E4A2E;color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;display:flex;align-items:center;gap:5px}
.btn-done svg{width:13px;height:13px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.btn-done.undone{background:#F4F1EA;border:1.5px solid #DDD7CE;color:#5A5248}
.btn-done.undone svg{stroke:#5A5248}
.btn-problem{padding:9px 14px;border-radius:7px;border:1.5px solid #9C3A2B;background:#F5EAE8;color:#7A2418;font-size:12px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif}
.btn-fisa{padding:9px 14px;border-radius:7px;border:1.5px solid #5A5248;background:#fff;color:#3A3530;font-size:12px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;display:flex;align-items:center;gap:5px}
.btn-fisa svg{width:13px;height:13px;stroke:#3A3530;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.done-info{display:flex;align-items:center;gap:6px;margin-top:8px;padding:8px 10px;background:#EAF0EC;border-radius:6px}
.done-info svg{width:14px;height:14px;stroke:#1E4A2E;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.done-info-text{font-size:12px;font-weight:700;color:#1E4A2E}
.problem-info{margin-top:6px;padding:8px 10px;background:#F5EAE8;border-radius:6px;font-size:11px;color:#7A2418;font-style:italic}
.diff-info{margin-top:6px;padding:8px 10px;background:#FFF3CD;border-left:3px solid #B0892B;border-radius:0 6px 6px 0;font-size:11px;color:#8B6914}

/* MESAJE IN COMANDA */
.order-msgs{padding:12px 16px;background:#F4F1EA;border-top:1px solid #EDE8DF}
.order-msgs-label{font-size:9px;font-weight:700;color:#5A5248;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px}
.msg-bubble{background:#fff;border-radius:8px;padding:9px 12px;margin-bottom:6px}
.msg-bubble.mine{background:#E8EFF6}
.msg-sender{font-size:10px;font-weight:700;color:#3A3530;margin-bottom:3px}
.msg-text{font-size:12px;color:#111111;line-height:1.5}
.msg-reply{margin-top:5px;padding:5px 8px;background:rgba(54,90,67,.1);border-radius:5px;font-size:11px;color:#1E4A2E}

/* FINALIZARE */
.finalize-wrap{padding:14px 16px;border-top:1px solid #EDE8DF}
.btn-finalize{width:100%;padding:14px;border-radius:8px;border:none;background:#111111;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-finalize:disabled{background:#C8C0B8;cursor:not-allowed}
.btn-finalize svg{width:16px;height:16px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* MESAJE TAB */
.msg-item{background:#fff;border-bottom:1px solid #EDE8DF;padding:14px 16px;cursor:pointer}
.msg-item.unread{background:#FFF9F0;border-left:3px solid #9C3A2B}
.msg-from{font-size:12px;font-weight:700;color:#111111;margin-bottom:2px}
.msg-preview{font-size:12px;color:#5A5248;margin-top:2px}
.msg-time{font-size:10px;color:#9E9890;margin-top:3px}
.msg-order-tag{font-size:9px;font-weight:700;color:#8B6914;font-family:monospace;margin-bottom:2px}

/* FINALIZATE */
.fin-card{background:#fff;border:1px solid #DDD7CE;border-radius:10px;padding:14px 16px;margin-bottom:8px}

/* EMPTY */
.empty{text-align:center;padding:60px 20px;color:#9E9890}
.empty svg{width:36px;height:36px;stroke:#DDD7CE;fill:none;stroke-width:1.5;margin:0 auto 12px;display:block}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:flex-end;justify-content:center}
.modal-overlay.show{display:flex}
.modal-box{background:#fff;border-radius:14px 14px 0 0;padding:22px 20px 36px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto}
.modal-title{font-family:'Playfair Display',serif;font-size:18px;color:#111111;margin-bottom:6px;font-weight:700}
.modal-sub{font-size:12px;color:#5A5248;margin-bottom:16px}
.fld{margin-bottom:12px}
.fld label{display:block;font-size:10px;font-weight:700;color:#3A3530;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.fld textarea,.fld select{width:100%;padding:11px 13px;border:1.5px solid #C8C0B8;border-radius:8px;font-size:14px;font-family:'Inter',sans-serif;color:#111111;outline:none;background:#fff}
.fld textarea{resize:none;height:80px}
.btn-red{width:100%;padding:13px;border-radius:8px;border:none;background:#9C3A2B;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;margin-bottom:8px}
.btn-black{width:100%;padding:13px;border-radius:8px;border:none;background:#111111;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;margin-bottom:8px}
.btn-cancel{width:100%;padding:12px;border-radius:8px;border:1.5px solid #C8C0B8;background:#fff;color:#3A3530;font-size:13px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif}

/* LOADING / TOAST */
.lov{display:none;position:fixed;inset:0;background:rgba(244,241,234,.96);z-index:999;align-items:center;justify-content:center;flex-direction:column;gap:14px}
.lov.show{display:flex}
.spinner{width:28px;height:28px;border:2px solid #DDD7CE;border-top-color:#B08D57;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.lov-text{font-size:13px;color:#2A2A2A;font-weight:600}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#111111;color:#fff;padding:10px 18px;border-radius:8px;font-size:12px;font-weight:700;white-space:nowrap;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="lov" id="lov"><div class="spinner"></div><div class="lov-text" id="lovText">Se încarcă...</div></div>
<div class="toast" id="toast"></div>

<!-- MODAL PROBLEMĂ -->
<div class="modal-overlay" id="problemModal">
  <div class="modal-box">
    <div class="modal-title">Raportează problemă</div>
    <div class="modal-sub" id="problemSub"></div>
    <div class="fld"><label>Tip problemă</label>
      <select id="problemTip">
        <option value="material">Material defect / insuficient</option>
        <option value="model">Problemă model / tipar</option>
        <option value="culoare">Culoare greșită</option>
        <option value="cusut">Problemă la cusut</option>
        <option value="alta">Altă problemă</option>
      </select>
    </div>
    <div class="fld"><label>Descriere</label>
      <textarea id="problemDesc" placeholder="Descrie problema în detaliu..."></textarea>
    </div>
    <button class="btn-red" onclick="saveProblem()">Raportează la Management</button>
    <button class="btn-cancel" onclick="closeModal('problemModal')">Anulează</button>
  </div>
</div>

<!-- MODAL MESAJ NOU -->
<div class="modal-overlay" id="newMsgModal">
  <div class="modal-box">
    <div class="modal-title">Mesaj către Management</div>
    <div class="fld"><label>Prioritate</label>
      <select id="msgPriority"><option value="normal">Normală</option><option value="urgent">Urgentă ⚡</option></select>
    </div>
    <div class="fld"><label>Mesaj</label>
      <textarea id="msgText" placeholder="Scrie mesajul..."></textarea>
    </div>
    <button class="btn-black" onclick="sendMsg()">Trimite</button>
    <button class="btn-cancel" onclick="closeModal('newMsgModal')">Anulează</button>
  </div>
</div>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-left">
    <div class="hdr-brand">SILESCO · Croit</div>
    <div class="hdr-title">Atelier Croit</div>
  </div>
  <div class="hdr-right">
    <div class="hdr-badge" id="hdrBadge">0 comenzi</div>
    <button class="msg-btn" onclick="setTab('mesaje')">
      <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      Mesaje
      <span class="msg-badge" id="msgBadge" style="display:none">0</span>
    </button>
    <button class="logout-btn" onclick="doLogout()">
      <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    </button>
  </div>
</div>

<!-- TABS -->
<div class="tabs">
  <div class="tab active" id="tab_comenzi" onclick="setTab('comenzi')">Active</div>
  <div class="tab" id="tab_finalizate" onclick="setTab('finalizate')">Finalizate</div>
  <div class="tab" id="tab_mesaje" onclick="setTab('mesaje')">Mesaje</div>
</div>

<!-- CONTENT -->
<div class="wrap">
  <div id="viewComenzi">
    <div id="cmdList"></div>
    <div class="empty" id="cmdEmpty" style="display:none">
      <svg viewBox="0 0 24 24"><path d="M6 9a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"/><path d="M6 15a3 3 0 1 0 0 6 3 3 0 0 0 0-6z"/><path d="M20 4 8.12 15.88"/></svg>
      <div style="font-size:13px;font-weight:600">Nicio comandă la croit</div>
    </div>
  </div>
  <div id="viewFinalizate" style="display:none">
    <div id="finList"></div>
    <div class="empty" id="finEmpty" style="display:none"><div style="font-size:13px;font-weight:600">Nicio comandă finalizată</div></div>
  </div>
  <div id="viewMesaje" style="display:none">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div style="font-size:9px;font-weight:700;color:#4A4540;text-transform:uppercase;letter-spacing:2px">Mesaje</div>
      <button onclick="openNewMsg()" style="padding:6px 14px;border-radius:6px;border:none;background:#111111;color:#fff;font-size:11px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif">+ Mesaj nou</button>
    </div>
    <div id="msgList"></div>
    <div class="empty" id="msgEmpty" style="display:none">
      <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <div style="font-size:13px;font-weight:600">Niciun mesaj</div>
    </div>
  </div>
</div>

<script>
const SURL='https://nprpwaxijtbjkxdhdxmq.supabase.co';
const SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5wcnB3YXhpanRiamt4ZGhkeG1xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5ODc3MzIsImV4cCI6MjA5NTU2MzczMn0.Ae8_C-3ke-KBTgIy9xcJZeDNFaR3Q9vTkoPxC6AbAg0';
const{createClient}=supabase;
const sb=createClient(SURL,SKEY);

let CU=null,CP=null,orders=[],finOrders=[];
let problemOrderId=null,problemLineId=null,problemArtName='';
// artState: {lineId: {done, ponytage_done, problem}}
let artState={};

window.addEventListener('DOMContentLoaded',async()=>{
  const{data:{session}}=await sb.auth.getSession();
  if(!session){window.location.href='/index.html';return;}
  CU=session.user;
  const{data:p}=await sb.from('user_profiles').select('full_name,role').eq('id',CU.id).single();
  CP=p;
  if(!['croit','management'].includes(p?.role)){window.location.href='/index.html';return;}
  sb.auth.onAuthStateChange(ev=>{if(ev==='SIGNED_OUT')window.location.href='/index.html';});
  await loadAll();
});

async function doLogout(){await sb.auth.signOut();}

async function loadAll(){
  showLov('Se încarcă...');
  await Promise.all([loadOrders(),loadMsgBadge()]);
  hideLov();
}

async function loadOrders(){
  const{data:active}=await sb.from('orders')
    .select(`id,order_no,status,delivery_date,total_pairs,notes,
      clients!orders_client_id_fkey(name,company_name),
      order_lines(id,product_id,free_model,color,ponytage,total_pairs,unit_price,notes,from_stock,products(code,name))`)
    .in('status',['la_croit','in_productie'])
    .order('created_at',{ascending:true});
  orders=active||[];

  const{data:fin}=await sb.from('orders')
    .select(`id,order_no,status,delivery_date,updated_at,
      clients!orders_client_id_fkey(name,company_name),
      order_lines(id,product_id,free_model,color,ponytage,total_pairs,products(code))`)
    .eq('status','fete_gata_cusut')
    .order('updated_at',{ascending:false}).limit(20);
  finOrders=fin||[];

  // Init stare articole
  orders.forEach(o=>{
    (o.order_lines||[]).forEach(l=>{
      if(!artState[l.id]){
        artState[l.id]={done:false,ponytage_done:{...l.ponytage},problem:null};
      }
    });
  });

  document.getElementById('hdrBadge').textContent=orders.length+(orders.length===1?' comandă':' comenzi');
  renderOrders();
  renderFinalizate();
}

async function loadMsgBadge(){
  const{data}=await sb.from('internal_messages').select('id').eq('to_department','croit').eq('is_read',false);
  const n=(data||[]).length;
  const b=document.getElementById('msgBadge');
  if(n>0){b.style.display='inline';b.textContent=n;}else{b.style.display='none';}
}

function setTab(t){
  ['comenzi','finalizate','mesaje'].forEach(x=>{
    document.getElementById('view'+x.charAt(0).toUpperCase()+x.slice(1)).style.display=x===t?'block':'none';
    document.getElementById('tab_'+x).classList.toggle('active',x===t);
  });
  if(t==='mesaje')loadMsgs();
}

// ── RENDER COMENZI ────────────────────────────────────────────
function renderOrders(){
  const el=document.getElementById('cmdList');
  const empty=document.getElementById('cmdEmpty');
  if(!orders.length){el.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';
  el.innerHTML=orders.map((o,i)=>renderOrderCard(o,i)).join('');
}

function getModName(l){
  return l.products?.code?'Art. '+l.products.code:l.free_model||(l.notes?l.notes.match(/\[([^\]]+)\]/)?.[1]||l.color:l.color)||'—';
}

function renderOrderCard(o,i){
  const cl=o.clients?.company_name||o.clients?.name||'—';
  const lines=o.order_lines||[];
  const doneCnt=lines.filter(l=>artState[l.id]?.done).length;
  const allDone=lines.length>0&&doneCnt===lines.length;
  const dd=o.delivery_date?new Date(o.delivery_date).toLocaleDateString('ro-RO'):'—';
  const dl=o.delivery_date?Math.ceil((new Date(o.delivery_date)-new Date())/86400000):null;
  const dc=dl===null?'#5A5248':dl<0?'#9C3A2B':dl<=3?'#B0892B':'#5A5248';
  const dtText=dl===null?'':dl<0?'+'+Math.abs(dl)+'z întârziere':dl===0?'Azi':dl+'z';

  // Preview articole
  const previewChips=lines.map(l=>{
    const st=artState[l.id];
    const mod=getModName(l);
    const isDone=st?.done;
    return `<span class="art-chip" style="${isDone?'background:#EAF0EC;border-color:rgba(54,90,67,.3);color:#1E4A2E':''}">${isDone?'✓ ':''}${mod} · ${l.color||'—'}</span>`;
  }).join('');

  return `<div class="cmd-card" id="cmd_${o.id}">
    <div class="cmd-header" onclick="togCmd('${o.id}','arr_${o.id}')">
      <div class="cmd-main">
        <div class="cmd-no">${o.order_no||'—'}</div>
        <div class="cmd-client">${cl}</div>
        <div class="cmd-preview">${previewChips}</div>
        <div class="cmd-meta"><span style="color:${dc};font-weight:${dl!==null&&dl<=3?700:400}">${dtText}</span>${dtText?' · ':''}<span>Livrare: ${dd}</span></div>
      </div>
      <div class="cmd-progress">
        <div class="cmd-prog-num" style="color:${allDone?'#1E4A2E':'#111111'}">${doneCnt}/${lines.length}</div>
        <div class="cmd-prog-label">art.</div>
      </div>
      <svg class="cmd-arrow" id="arr_${o.id}" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
    </div>
    <div class="cmd-body" id="body_${o.id}">
      ${o.notes?`<div style="padding:10px 16px;background:#FAF3E0;border-bottom:1px solid #EDE8DF;font-size:12px;color:#8B6914"><strong>Obs. comandă:</strong> ${o.notes}</div>`:''}
      ${lines.map(l=>renderArtRow(l,o.id)).join('')}
      <!-- Mesaje comandă -->
      <div id="omsg_${o.id}" class="order-msgs" style="display:none"></div>
      <!-- Finalizare -->
      <div class="finalize-wrap">
        <button class="btn-finalize" id="fin_${o.id}" onclick="finalizeOrder('${o.id}')" ${allDone?'':'disabled'}>
          <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
          ${allDone?'Finalizează — trimite la cusut':'Bifează toate articolele'}
        </button>
      </div>
    </div>
  </div>`;
}

function renderArtRow(l,orderId){
  const st=artState[l.id]||{done:false,ponytage_done:{...l.ponytage},problem:null};
  const modName=getModName(l);
  const notesClean=l.notes?l.notes.replace(/\[Discount:[^\]]+\]\s*/,'').replace(/\[[^\]]+\]\s*/,'').trim():'';

  // Pontaj planificat
  const entries=l.ponytage?Object.entries(l.ponytage).filter(([,q])=>q>0):[];
  const totalPlanificat=entries.reduce((s,[,q])=>s+q,0);
  const totalCroit=Object.values(st.ponytage_done||{}).reduce((s,q)=>s+q,0);
  const hasDiff=JSON.stringify(st.ponytage_done)!==JSON.stringify(l.ponytage);

  const pontajHTML=entries.map(([s,q])=>{
    const done=st.ponytage_done?.[s]??q;
    const isModified=done!==q;
    const isZero=done===0;
    return `<div class="sz-cell${isModified?' modified':''}${isZero?' zero':''}">
      <div class="sz-nr">Nr.${s}</div>
      <div class="sz-planned">${q} plan.</div>
      <div class="sz-controls">
        <button class="sz-btn" onclick="adjPontaj('${l.id}','${s}',-1,'${orderId}')">−</button>
        <span class="sz-val" id="pv_${l.id}_${s}">${done}</span>
        <button class="sz-btn" onclick="adjPontaj('${l.id}','${s}',1,'${orderId}')">+</button>
      </div>
    </div>`;
  }).join('');

  return `<div class="art-row${st.done?' done':''}${st.problem&&!st.done?' has-problem':''}" id="art_${l.id}">
    <div class="art-top">
      <div>
        <div class="art-name">${modName}${l.from_stock?'<span style="font-size:9px;background:#E8EFF6;color:#23394F;padding:1px 6px;border-radius:3px;margin-left:6px">📦 STOC</span>':''}</div>
        <div class="art-color">${l.color||'—'}</div>
        <div class="art-planned">${totalPlanificat} per. planificate</div>
      </div>
    </div>
    ${notesClean?`<div style="font-size:11px;color:#8B6914;margin-bottom:8px;padding:5px 8px;background:#FAF3E0;border-radius:5px"><strong>Obs:</strong> ${notesClean}</div>`:''}
    <div class="pontaj-edit">
      <div class="pontaj-edit-label">Pontaj croit (ajustează dacă e nevoie)</div>
      <div class="pontaj-grid">${pontajHTML}</div>
    </div>
    ${hasDiff&&!st.done?`<div class="diff-info">⚠ Diferență față de plan: ${totalCroit}/${totalPlanificat} per. — bifează Croit când termini</div>`:''}
    <div class="art-actions">
      <button class="btn-done${st.done?' undone':''}" onclick="toggleDone('${l.id}','${orderId}')">
        <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        ${st.done?'Anulează':'Croit ✓'}
      </button>
      <button class="btn-problem" onclick="openProblem('${orderId}','${l.id}','${modName} · ${(l.color||'').replace(/'/g,"\\'")}')">⚠ Problemă</button>
      <button class="btn-fisa" onclick="genFisaProductie('${orderId}')">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Fișă
      </button>
    </div>
    ${st.done?`<div class="done-info"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg><span class="done-info-text">${totalCroit} perechi croite${hasDiff?' (diferit față de plan)':''}</span></div>`:''}
    ${st.problem?`<div class="problem-info">⚠ ${st.problem}</div>`:''}
  </div>`;
}

// ── TOGGLE EXPAND ─────────────────────────────────────────────
function togCmd(orderId,arrowId){
  const body=document.getElementById('body_'+orderId);
  const arr=document.getElementById(arrowId);
  const open=body.style.display==='block';
  body.style.display=open?'none':'block';
  if(arr)arr.style.transform=open?'rotate(0deg)':'rotate(180deg)';
  if(!open)loadOrderMsgs(orderId);
}

// ── PONTAJ AJUSTABIL ──────────────────────────────────────────
function adjPontaj(lineId,sz,delta,orderId){
  const st=artState[lineId];
  if(!st)return;
  const current=st.ponytage_done[sz]??0;
  st.ponytage_done[sz]=Math.max(0,current+delta);
  // Update UI
  const el=document.getElementById('pv_'+lineId+'_'+sz);
  if(el)el.textContent=st.ponytage_done[sz];
  // Update cell style
  const o=orders.find(x=>x.order_lines?.some(l=>l.id===lineId));
  const l=o?.order_lines?.find(x=>x.id===lineId);
  if(l){
    const planned=l.ponytage?.[sz]||0;
    const done=st.ponytage_done[sz];
    const cell=el?.closest('.sz-cell');
    if(cell){
      cell.classList.toggle('modified',done!==planned);
      cell.classList.toggle('zero',done===0);
    }
  }
  // Update diff info
  updateDiffInfo(lineId,orderId);
}

function updateDiffInfo(lineId,orderId){
  const st=artState[lineId];
  const o=orders.find(x=>x.order_lines?.some(l=>l.id===lineId));
  const l=o?.order_lines?.find(x=>x.id===lineId);
  if(!l||!st)return;
  const artEl=document.getElementById('art_'+lineId);
  if(!artEl)return;
  // Re-render articolul
  artEl.outerHTML=renderArtRow(l,orderId);
  updateFinalizeBtn(orderId);
}

// ── DONE TOGGLE ───────────────────────────────────────────────
function toggleDone(lineId,orderId){
  const st=artState[lineId];
  if(!st)return;
  st.done=!st.done;
  const o=orders.find(x=>x.order_lines?.some(l=>l.id===lineId));
  const l=o?.order_lines?.find(x=>x.id===lineId);
  if(l){
    const artEl=document.getElementById('art_'+lineId);
    if(artEl)artEl.outerHTML=renderArtRow(l,orderId);
  }
  updateFinalizeBtn(orderId);
  // Update preview chips
  updatePreviewChips(orderId);
}

function updatePreviewChips(orderId){
  const o=orders.find(x=>x.id===orderId);
  if(!o)return;
  const card=document.getElementById('cmd_'+orderId);
  if(!card)return;
  const lines=o.order_lines||[];
  const chips=lines.map(l=>{
    const st=artState[l.id];
    const mod=getModName(l);
    const isDone=st?.done;
    return `<span class="art-chip" style="${isDone?'background:#EAF0EC;border-color:rgba(54,90,67,.3);color:#1E4A2E':''}">${isDone?'✓ ':''}${mod} · ${l.color||'—'}</span>`;
  }).join('');
  const previewEl=card.querySelector('.cmd-preview');
  if(previewEl)previewEl.innerHTML=chips;
}

function updateFinalizeBtn(orderId){
  const o=orders.find(x=>x.id===orderId);
  if(!o)return;
  const lines=o.order_lines||[];
  const allDone=lines.length>0&&lines.every(l=>artState[l.id]?.done);
  const doneCnt=lines.filter(l=>artState[l.id]?.done).length;
  const btn=document.getElementById('fin_'+orderId);
  if(btn){
    btn.disabled=!allDone;
    btn.innerHTML=`<svg viewBox="0 0 24 24" style="width:16px;height:16px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><polyline points="20 6 9 17 4 12"/></svg>${allDone?'Finalizează — trimite la cusut':'Bifează toate articolele ('+doneCnt+'/'+lines.length+')'}`;
    // Update progress counter
    const progEl=document.querySelector(`#cmd_${orderId} .cmd-prog-num`);
    if(progEl){progEl.textContent=doneCnt+'/'+lines.length;progEl.style.color=allDone?'#1E4A2E':'#111111';}
  }
}

// ── PROBLEMĂ ──────────────────────────────────────────────────
function openProblem(orderId,lineId,artName){
  problemOrderId=orderId;problemLineId=lineId;problemArtName=artName;
  document.getElementById('problemSub').textContent=artName;
  document.getElementById('problemDesc').value='';
  document.getElementById('problemTip').value='material';
  document.getElementById('problemModal').classList.add('show');
}

async function saveProblem(){
  const tip=document.getElementById('problemTip').value;
  const desc=document.getElementById('problemDesc').value.trim();
  if(!desc){showToast('Descrie problema!');return;}
  const tipLabels={material:'Material defect/insuficient',model:'Problemă model/tipar',culoare:'Culoare greșită',cusut:'Problemă la cusut',alta:'Altă problemă'};
  const text=tipLabels[tip]+': '+desc;
  const st=artState[problemLineId];
  if(st)st.problem=text;
  const o=orders.find(x=>x.id===problemOrderId);
  showLov('Se raportează...');
  await sb.from('internal_messages').insert({
    from_user_id:CU.id,to_department:'management',
    order_id:problemOrderId,
    subject:'⚠ Problemă croit — '+(o?.order_no||''),
    message:'Problemă la '+(problemArtName||'articol')+': '+text,
    priority:'urgent',is_read:false,
  });
  hideLov();closeModal('problemModal');showToast('Problemă raportată!');
  const l=(o?.order_lines||[]).find(x=>x.id===problemLineId);
  if(l){const artEl=document.getElementById('art_'+problemLineId);if(artEl)artEl.outerHTML=renderArtRow(l,problemOrderId);}
}

// ── FINALIZARE ────────────────────────────────────────────────
async function finalizeOrder(orderId){
  const o=orders.find(x=>x.id===orderId);
  if(!o)return;
  const lines=o.order_lines||[];
  if(!lines.every(l=>artState[l.id]?.done)){showToast('Bifează toate articolele!');return;}
  showLov('Se finalizează...');
  // Build summary cu diferențe
  const diffs=[];
  const croitSummary=lines.map(l=>{
    const st=artState[l.id];
    const mod=getModName(l);
    const totalCroit=Object.values(st.ponytage_done||{}).reduce((s,q)=>s+q,0);
    const totalPlan=l.total_pairs;
    if(totalCroit!==totalPlan)diffs.push(mod+' '+l.color+': '+totalCroit+'/'+totalPlan+' per.');
    const ptStr=Object.entries(st.ponytage_done||{}).map(([s,q])=>s+'×'+q).join(' ');
    return mod+' '+l.color+': '+totalCroit+' per. ('+ptStr+')'+(st.problem?' ⚠':'');
  }).join(' | ');

  await sb.from('orders').update({status:'fete_gata_cusut',updated_at:new Date().toISOString()}).eq('id',orderId);
  await sb.from('audit_log').insert({
    table_name:'orders',record_id:orderId,action:'update',
    new_data:{action:'Croit finalizat: '+croitSummary,operator:CP?.full_name||'Croit'},
    done_by:CU.id,
  });
  // Notificare cu diferențe
  const difMsg=diffs.length?'\n⚠ Diferențe față de plan: '+diffs.join(', '):'';
  await sb.from('internal_messages').insert({
    from_user_id:CU.id,to_department:'management',
    order_id:orderId,
    subject:'Croit finalizat — '+(o.order_no||''),
    message:'Comanda '+(o.order_no||'')+' croită. '+croitSummary+difMsg,
    priority:diffs.length?'urgent':'normal',is_read:false,
  });
  hideLov();showToast('Finalizat — trimis la cusut!');
  await loadAll();
}

// ── MESAJE ÎN COMANDĂ ─────────────────────────────────────────
async function loadOrderMsgs(orderId){
  const el=document.getElementById('omsg_'+orderId);
  if(!el)return;
  const{data}=await sb.from('internal_messages')
    .select(`id,from_user_id,message,reply,created_at,user_profiles!internal_messages_from_user_id_fkey(full_name)`)
    .eq('order_id',orderId).is('parent_id',null)
    .order('created_at',{ascending:false}).limit(5);
  if(!data||!data.length){el.style.display='none';return;}
  el.style.display='block';
  el.innerHTML=`<div class="order-msgs-label">Mesaje comandă</div>
    ${data.map(m=>{
      const isMine=m.from_user_id===CU.id;
      const sender=isMine?'Tu':m.user_profiles?.full_name||'Management';
      return `<div class="msg-bubble${isMine?' mine':''}">
        <div class="msg-sender">${sender}</div>
        <div class="msg-text">${m.message}</div>
        ${m.reply?`<div class="msg-reply"><strong>Răspuns:</strong> ${m.reply}</div>`:''}
      </div>`;
    }).join('')}
    <a href="/agent-messages.html" style="font-size:11px;color:#B08D57;font-weight:700;text-decoration:none">Vezi toate →</a>`;
}

// ── FIȘĂ PRODUCȚIE ────────────────────────────────────────────
async function genFisaProductie(orderId){
  showLov('Se generează fișa...');
  const{data:o}=await sb.from('orders')
    .select('*,clients!orders_client_id_fkey(*),order_lines(*,products(code,name))')
    .eq('id',orderId).single();
  hideLov();
  if(!o)return;
  const cl=o.clients?.company_name||o.clients?.name||'—';
  const dd=o.delivery_date?new Date(o.delivery_date).toLocaleDateString('ro-RO'):'—';
  const azi=new Date().toLocaleDateString('ro-RO');
  const sumar=o.order_lines.map(l=>{
    const mod=l.products?.code?'Art. '+l.products.code:l.free_model||(l.notes?l.notes.match(/\[([^\]]+)\]/)?.[1]||l.color:l.color)||'—';
    const entries=l.ponytage?Object.entries(l.ponytage):'';
    const pt=entries?entries.map(([s,q])=>`${s}×${q}`).join('  '):'';
    const notesClean=l.notes?l.notes.replace(/\[Discount:[^\]]+\]\s*/,'').replace(/\[[^\]]+\]\s*/,'').trim():'';
    return `<tr>
      <td style="border:1px solid #ccc;padding:8px 10px;font-weight:700">${mod}</td>
      <td style="border:1px solid #ccc;padding:8px 10px">${l.color||'—'}</td>
      <td style="border:1px solid #ccc;padding:8px 10px;font-family:monospace;font-size:12px">${pt}</td>
      <td style="border:1px solid #ccc;padding:8px 10px;text-align:center;font-weight:700">${l.total_pairs}</td>
      ${notesClean?`<td style="border:1px solid #ccc;padding:8px 10px;font-size:11px;color:#B08D57">${notesClean}</td>`:'<td style="border:1px solid #ccc;padding:8px 10px">—</td>'}
    </tr>`;
  }).join('');
  const html=`<html><head><meta charset="UTF-8"><style>
    body{font-family:Arial,sans-serif;padding:24px;color:#111}
    h1{font-size:20px;margin-bottom:4px}
    .sub{font-size:11px;color:#888;margin-bottom:20px;text-transform:uppercase;letter-spacing:1px}
    table{width:100%;border-collapse:collapse;margin-top:16px}
    th{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:#888;padding:8px 10px;border:1px solid #ccc;background:#f9f9f9;text-align:left}
    @media print{.noprint{display:none}}
  </style></head><body>
  <h1>SILESCO · Fișă Croit</h1>
  <div class="sub">${o.order_no||'—'} · ${cl} · ${azi}</div>
  <div style="display:flex;gap:40px;margin-bottom:20px">
    <div><div style="font-size:9px;color:#888;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Client</div><div style="font-weight:700">${cl}</div></div>
    <div><div style="font-size:9px;color:#888;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Termen</div><div style="font-weight:700">${dd}</div></div>
    <div><div style="font-size:9px;color:#888;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Total</div><div style="font-weight:700">${o.total_pairs||0} perechi</div></div>
  </div>
  <table>
    <thead><tr>
      <th>Model</th><th>Culoare</th><th>Pontaj</th><th style="text-align:center">Total</th><th>Observații</th>
    </tr></thead>
    <tbody>${sumar}</tbody>
  </table>
  ${o.notes?`<div style="margin-top:16px;padding:10px 14px;background:#FAF3E0;border-left:3px solid #B08D57;font-size:12px"><strong>Obs. generale:</strong> ${o.notes}</div>`:''}
  <br><button class="noprint" onclick="window.print()" style="margin-top:16px;padding:10px 20px;background:#111;color:#fff;border:none;border-radius:6px;font-size:12px;cursor:pointer;font-weight:700">Printează</button>
  </body></html>`;
  const w=window.open('','_blank','width=700,height=900');
  w.document.write(html);w.document.close();
}

// ── MESAJE TAB ────────────────────────────────────────────────
async function loadMsgs(){
  const{data}=await sb.from('internal_messages')
    .select(`id,from_user_id,to_department,order_id,message,subject,priority,is_read,reply,created_at,
      user_profiles!internal_messages_from_user_id_fkey(full_name),
      orders(order_no)`)
    .or(`to_department.eq.croit,from_user_id.eq.${CU.id}`)
    .is('parent_id',null)
    .order('created_at',{ascending:false}).limit(30);
  const msgs=data||[];
  const unreadIds=msgs.filter(m=>!m.is_read&&m.from_user_id!==CU.id).map(m=>m.id);
  if(unreadIds.length)await sb.from('internal_messages').update({is_read:true,read_at:new Date().toISOString()}).in('id',unreadIds);
  await loadMsgBadge();
  const el=document.getElementById('msgList');
  const empty=document.getElementById('msgEmpty');
  if(!msgs.length){el.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';
  el.innerHTML=msgs.map(m=>{
    const isMine=m.from_user_id===CU.id;
    const isUnread=!m.is_read&&!isMine;
    const isUrgent=m.priority==='urgent';
    const sender=isMine?'Tu → Management':m.user_profiles?.full_name||'Management';
    const t=new Date(m.created_at);
    const timeStr=t.toLocaleDateString('ro-RO')===new Date().toLocaleDateString('ro-RO')?t.toLocaleTimeString('ro-RO',{hour:'2-digit',minute:'2-digit'}):t.toLocaleDateString('ro-RO');
    return `<div class="msg-item${isUnread?' unread':''}">
      ${m.orders?`<div class="msg-order-tag">${m.orders.order_no}</div>`:''}
      <div class="msg-from">${sender}${isUrgent?' ⚡':''}</div>
      <div class="msg-preview">${m.subject||m.message.slice(0,80)}</div>
      ${m.reply?`<div style="margin-top:5px;padding:5px 8px;background:#EAF0EC;border-radius:5px;font-size:11px;color:#1E4A2E"><strong>Răspuns:</strong> ${m.reply}</div>`:''}
      <div class="msg-time">${timeStr}</div>
    </div>`;
  }).join('');
}

function openNewMsg(){document.getElementById('msgText').value='';document.getElementById('msgPriority').value='normal';document.getElementById('newMsgModal').classList.add('show');}
async function sendMsg(){
  const text=document.getElementById('msgText').value.trim();
  const priority=document.getElementById('msgPriority').value;
  if(!text){showToast('Scrie mesajul!');return;}
  showLov('Se trimite...');
  await sb.from('internal_messages').insert({from_user_id:CU.id,to_department:'management',message:text,priority,is_read:false});
  hideLov();closeModal('newMsgModal');showToast('Mesaj trimis!');loadMsgs();
}

function closeModal(id){document.getElementById(id).classList.remove('show');}
function showLov(t){document.getElementById('lovText').textContent=t||'Se încarcă...';document.getElementById('lov').classList.add('show');}
function hideLov(){document.getElementById('lov').classList.remove('show');}
function showToast(m){const e=document.getElementById('toast');e.textContent=m;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),2500);}
