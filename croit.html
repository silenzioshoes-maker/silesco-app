<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SILESCO · Croit</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',sans-serif;background:#F4F1EA;min-height:100vh;color:#111111}

/* HEADER */
.hdr{background:#111111;padding:16px 20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:50}
.hdr-left{display:flex;flex-direction:column}
.hdr-brand{font-size:9px;color:rgba(255,255,255,.3);letter-spacing:2.5px;text-transform:uppercase;margin-bottom:3px}
.hdr-title{font-family:'Playfair Display',serif;font-size:20px;color:#fff;font-weight:700}
.hdr-right{display:flex;align-items:center;gap:8px}
.hdr-badge{background:rgba(176,141,87,.15);border:1px solid rgba(176,141,87,.3);border-radius:20px;padding:4px 12px;font-size:11px;color:#B08D57;font-weight:600}
.msg-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:8px;padding:6px 10px;cursor:pointer;position:relative;display:flex;align-items:center;gap:5px}
.msg-btn svg{width:16px;height:16px;stroke:#fff;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.msg-btn-badge{background:#9C3A2B;color:#fff;font-size:9px;font-weight:700;border-radius:8px;padding:1px 5px;min-width:14px;text-align:center}
.logout-btn{background:none;border:none;cursor:pointer;padding:6px}
.logout-btn svg{width:16px;height:16px;stroke:rgba(255,255,255,.4);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}

/* NAV TABS */
.tabs{background:#fff;border-bottom:1px solid #DDD7CE;display:flex;position:sticky;top:57px;z-index:40}
.tab{flex:1;padding:12px;text-align:center;font-size:12px;font-weight:700;color:#5A5248;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.tab.active{color:#111111;border-bottom-color:#111111}

/* COMENZI LIST */
.wrap{padding:14px 16px 100px}
.sec-label{font-size:9px;font-weight:700;color:#4A4540;text-transform:uppercase;letter-spacing:2px;margin-bottom:10px}

/* COMANDA CARD */
.cmd-card{background:#fff;border:1px solid #DDD7CE;border-radius:10px;margin-bottom:10px;overflow:hidden}
.cmd-header{padding:14px 16px;cursor:pointer;display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.cmd-header:active{background:#F4F1EA}
.cmd-no{font-size:10px;font-family:'Courier New',monospace;color:#5A5248;margin-bottom:3px;letter-spacing:.5px}
.cmd-client{font-family:'Playfair Display',serif;font-size:17px;color:#111111;margin-bottom:4px}
.cmd-meta{font-size:11px;color:#5A5248}
.cmd-progress{text-align:right;flex-shrink:0}
.cmd-progress-num{font-family:'Playfair Display',serif;font-size:22px;font-weight:700}
.cmd-progress-label{font-size:9px;color:#5A5248;text-transform:uppercase;letter-spacing:.5px}
.cmd-arrow{width:14px;height:14px;stroke:#5A5248;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;transition:transform .2s;flex-shrink:0;margin-top:4px}

/* ARTICOL ROW */
.cmd-body{display:none;border-top:1px solid #EDE8DF;padding:12px 16px}
.art-row{background:#F4F1EA;border-radius:8px;padding:12px 14px;margin-bottom:8px;transition:all .2s}
.art-row.done{background:#EAF0EC;border:1px solid rgba(54,90,67,.2)}
.art-row.problem{background:#F5EAE8;border:1px solid rgba(156,58,43,.2)}
.art-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.art-name{font-size:14px;font-weight:700;color:#111111}
.art-color{font-size:12px;color:#5A5248;margin-top:1px}
.art-planned{font-size:11px;color:#5A5248;margin-top:2px}
.art-pontaj{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px}
.pontaj-chip{background:#fff;border:1px solid #DDD7CE;border-radius:4px;padding:3px 8px;font-size:11px;font-weight:700;color:#111111;font-family:monospace}
.art-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.qty-input-wrap{display:flex;align-items:center;gap:6px;background:#fff;border:1.5px solid #DDD7CE;border-radius:7px;padding:4px 8px}
.qty-input-wrap label{font-size:10px;font-weight:700;color:#5A5248;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
.qty-input{width:52px;border:none;outline:none;font-size:16px;font-weight:700;color:#111111;font-family:'Playfair Display',serif;background:transparent;text-align:center}
.btn-done{padding:8px 16px;border-radius:7px;border:none;background:#1E4A2E;color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;display:flex;align-items:center;gap:5px}
.btn-done svg{width:13px;height:13px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.btn-done.undone{background:#F4F1EA;border:1.5px solid #DDD7CE;color:#5A5248}
.btn-done.undone svg{stroke:#5A5248}
.btn-problem{padding:8px 12px;border-radius:7px;border:1.5px solid #9C3A2B;background:#F5EAE8;color:#7A2418;font-size:12px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif}
.art-done-info{display:flex;align-items:center;gap:6px;margin-top:6px}
.done-check{width:16px;height:16px;stroke:#1E4A2E;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.done-text{font-size:12px;font-weight:700;color:#1E4A2E}
.problem-text{font-size:11px;color:#7A2418;margin-top:5px;padding:6px 10px;background:#F5EAE8;border-radius:5px;font-style:italic}

/* FINALIZE BTN */
.btn-finalize{width:100%;padding:14px;border-radius:8px;border:none;background:#111111;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;margin-top:12px;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-finalize:disabled{background:#C8C0B8;cursor:not-allowed}
.btn-finalize svg{width:16px;height:16px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* PROBLEM MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:flex-end;justify-content:center}
.modal-overlay.show{display:flex}
.modal-box{background:#fff;border-radius:14px 14px 0 0;padding:22px 20px 36px;width:100%;max-width:480px}
.modal-title{font-family:'Playfair Display',serif;font-size:18px;color:#111111;margin-bottom:6px;font-weight:700}
.modal-sub{font-size:12px;color:#5A5248;margin-bottom:16px}
.fld{margin-bottom:12px}
.fld label{display:block;font-size:10px;font-weight:700;color:#3A3530;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.fld textarea,.fld select{width:100%;padding:11px 13px;border:1.5px solid #C8C0B8;border-radius:8px;font-size:14px;font-family:'Inter',sans-serif;color:#111111;outline:none;background:#fff}
.fld textarea{resize:none;height:80px}
.btn-save{width:100%;padding:13px;border-radius:8px;border:none;background:#9C3A2B;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;margin-bottom:8px}
.btn-cancel{width:100%;padding:12px;border-radius:8px;border:1.5px solid #C8C0B8;background:#fff;color:#3A3530;font-size:13px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif}

/* MESAJE */
.msg-item{background:#fff;border-bottom:1px solid #EDE8DF;padding:14px 16px;cursor:pointer}
.msg-item.unread{background:#FFF9F0;border-left:3px solid #9C3A2B}
.msg-from{font-size:12px;font-weight:700;color:#111111;margin-bottom:2px}
.msg-preview{font-size:12px;color:#5A5248;margin-top:2px}
.msg-time{font-size:10px;color:#9E9890;margin-top:3px}
.msg-order{font-size:9px;font-weight:700;color:#8B6914;font-family:monospace;margin-bottom:2px}

/* EMPTY */
.empty{text-align:center;padding:60px 20px;color:#9E9890}
.empty svg{width:36px;height:36px;stroke:#DDD7CE;fill:none;stroke-width:1.5;margin:0 auto 12px;display:block}

/* LOADING / TOAST */
.lov{display:none;position:fixed;inset:0;background:rgba(244,241,234,.96);z-index:999;align-items:center;justify-content:center;flex-direction:column;gap:14px}
.lov.show{display:flex}
.spinner{width:28px;height:28px;border:2px solid #DDD7CE;border-top-color:#B08D57;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.lov-text{font-size:13px;color:#2A2A2A;font-weight:600}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#111111;color:#fff;padding:10px 18px;border-radius:8px;font-size:12px;font-weight:700;white-space:nowrap;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="lov" id="lov"><div class="spinner"></div><div class="lov-text" id="lovText">Se încarcă...</div></div>
<div class="toast" id="toast"></div>

<!-- MODAL PROBLEMĂ -->
<div class="modal-overlay" id="problemModal">
  <div class="modal-box">
    <div class="modal-title">Raportează problemă</div>
    <div class="modal-sub" id="problemModalSub"></div>
    <div class="fld">
      <label>Tip problemă</label>
      <select id="problemTip">
        <option value="material">Material defect / insuficient</option>
        <option value="model">Problemă model / tipar</option>
        <option value="culoare">Culoare greșită</option>
        <option value="alta">Altă problemă</option>
      </select>
    </div>
    <div class="fld">
      <label>Descriere</label>
      <textarea id="problemDesc" placeholder="Descrie problema în detaliu..."></textarea>
    </div>
    <button class="btn-save" onclick="saveProblem()">Raportează problema</button>
    <button class="btn-cancel" onclick="closeModal('problemModal')">Anulează</button>
  </div>
</div>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-left">
    <div class="hdr-brand">SILESCO · Croit</div>
    <div class="hdr-title" id="hdrTitle">Comenzi</div>
  </div>
  <div class="hdr-right">
    <div class="hdr-badge" id="hdrBadge">0 comenzi</div>
    <button class="msg-btn" onclick="setTab('mesaje')">
      <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <span class="msg-btn-badge" id="msgBadge" style="display:none">0</span>
    </button>
    <button class="logout-btn" onclick="doLogout()">
      <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    </button>
  </div>
</div>

<!-- TABS -->
<div class="tabs">
  <div class="tab active" id="tab_comenzi" onclick="setTab('comenzi')">Comenzi active</div>
  <div class="tab" id="tab_finalizate" onclick="setTab('finalizate')">Finalizate</div>
  <div class="tab" id="tab_mesaje" onclick="setTab('mesaje')">Mesaje</div>
</div>

<!-- CONTENT -->
<div class="wrap">
  <!-- COMENZI ACTIVE -->
  <div id="viewComenzi">
    <div id="cmdList"></div>
    <div class="empty" id="cmdEmpty" style="display:none">
      <svg viewBox="0 0 24 24"><path d="M6 9a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"/><path d="M6 15a3 3 0 1 0 0 6 3 3 0 0 0 0-6z"/><path d="M20 4 8.12 15.88M14.47 14.48 20 20M8.12 8.12 12 12"/></svg>
      <div style="font-size:13px;font-weight:600">Nicio comandă la croit</div>
      <div style="font-size:11px;margin-top:4px">Comenzile lansate vor apărea aici</div>
    </div>
  </div>

  <!-- FINALIZATE -->
  <div id="viewFinalizate" style="display:none">
    <div id="finList"></div>
    <div class="empty" id="finEmpty" style="display:none">
      <div style="font-size:13px;font-weight:600">Nicio comandă finalizată</div>
    </div>
  </div>

  <!-- MESAJE -->
  <div id="viewMesaje" style="display:none">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div class="sec-label" style="margin-bottom:0">Mesaje de la Management</div>
      <button onclick="openNewMsg()" style="padding:6px 14px;border-radius:6px;border:none;background:#111111;color:#fff;font-size:11px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif">+ Mesaj nou</button>
    </div>
    <div id="msgList"></div>
    <div class="empty" id="msgEmpty" style="display:none">
      <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <div style="font-size:13px;font-weight:600">Niciun mesaj</div>
    </div>
  </div>
</div>

<!-- MODAL MESAJ NOU -->
<div class="modal-overlay" id="newMsgModal">
  <div class="modal-box">
    <div class="modal-title">Mesaj către Management</div>
    <div class="modal-sub">Raportează o problemă sau trimite o informație</div>
    <div class="fld">
      <label>Prioritate</label>
      <select id="msgPriority">
        <option value="normal">Normală</option>
        <option value="urgent">Urgentă ⚡</option>
      </select>
    </div>
    <div class="fld">
      <label>Mesaj</label>
      <textarea id="msgText" placeholder="Descrie problema sau informația..."></textarea>
    </div>
    <button class="btn-save" style="background:#111111" onclick="sendMsg()">Trimite la Management</button>
    <button class="btn-cancel" onclick="closeModal('newMsgModal')">Anulează</button>
  </div>
</div>

<script>
const SURL='https://nprpwaxijtbjkxdhdxmq.supabase.co';
const SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5wcnB3YXhpanRiamt4ZGhkeG1xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5ODc3MzIsImV4cCI6MjA5NTU2MzczMn0.Ae8_C-3ke-KBTgIy9xcJZeDNFaR3Q9vTkoPxC6AbAg0';
const{createClient}=supabase;
const sb=createClient(SURL,SKEY);

let CU=null,CP=null,orders=[],finOrders=[];
let problemOrderId=null,problemLineId=null;
// Stare locală per articol: {lineId: {done, qty_done, problem}}
let artState={};

window.addEventListener('DOMContentLoaded',async()=>{
  const{data:{session}}=await sb.auth.getSession();
  if(!session){window.location.href='/index.html';return;}
  CU=session.user;
  const{data:p}=await sb.from('user_profiles').select('full_name,role').eq('id',CU.id).single();
  CP=p;
  if(!['croit','management'].includes(p?.role)){window.location.href='/index.html';return;}
  sb.auth.onAuthStateChange(ev=>{if(ev==='SIGNED_OUT')window.location.href='/index.html';});
  await loadAll();
});

async function doLogout(){await sb.auth.signOut();}

async function loadAll(){
  showLov('Se încarcă...');
  await Promise.all([loadOrders(),loadMsgBadge()]);
  hideLov();
}

async function loadOrders(){
  // Comenzi la croit
  const{data:active}=await sb.from('orders')
    .select(`id,order_no,status,delivery_date,total_pairs,notes,
      clients!orders_client_id_fkey(name,company_name),
      order_lines(id,product_id,free_model,color,ponytage,total_pairs,unit_price,notes,from_stock,products(code,name))`)
    .eq('status','la_croit')
    .order('created_at',{ascending:true});
  orders=active||[];

  // Finalizate recent
  const{data:fin}=await sb.from('orders')
    .select(`id,order_no,status,delivery_date,total_pairs,
      clients!orders_client_id_fkey(name,company_name),
      order_lines(id,product_id,free_model,color,ponytage,total_pairs,products(code))`)
    .eq('status','fete_gata_cusut')
    .order('updated_at',{ascending:false})
    .limit(20);
  finOrders=fin||[];

  // Init stare articole
  orders.forEach(o=>{
    (o.order_lines||[]).forEach(l=>{
      if(!artState[l.id]){
        artState[l.id]={done:false,qty_done:l.total_pairs,problem:null};
      }
    });
  });

  document.getElementById('hdrBadge').textContent=orders.length+' comenzi';
  renderOrders();
  renderFinalizate();
}

async function loadMsgBadge(){
  const{data}=await sb.from('internal_messages')
    .select('id').eq('to_department','croit').eq('is_read',false);
  const n=(data||[]).length;
  const b=document.getElementById('msgBadge');
  if(n>0){b.style.display='inline';b.textContent=n;}else{b.style.display='none';}
}

// ── TABS ──────────────────────────────────────────────────────
function setTab(t){
  ['comenzi','finalizate','mesaje'].forEach(x=>{
    document.getElementById('view'+cap(x)).style.display=x===t?'block':'none';
    document.getElementById('tab_'+x).classList.toggle('active',x===t);
  });
  document.getElementById('hdrTitle').textContent=t==='comenzi'?'Comenzi active':t==='finalizate'?'Finalizate':'Mesaje';
  if(t==='mesaje')loadMsgs();
}
function cap(s){return s.charAt(0).toUpperCase()+s.slice(1);}

// ── RENDER COMENZI ────────────────────────────────────────────
function renderOrders(){
  const el=document.getElementById('cmdList');
  const empty=document.getElementById('cmdEmpty');
  if(!orders.length){el.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';
  el.innerHTML=orders.map((o,i)=>renderOrder(o,i)).join('');
}

function renderOrder(o,i){
  const cl=o.clients?.company_name||o.clients?.name||'—';
  const lines=o.order_lines||[];
  const doneCnt=lines.filter(l=>artState[l.id]?.done).length;
  const allDone=doneCnt===lines.length&&lines.length>0;
  const dd=o.delivery_date?new Date(o.delivery_date).toLocaleDateString('ro-RO'):'—';
  const dl=o.delivery_date?Math.ceil((new Date(o.delivery_date)-new Date())/86400000):null;
  const dc=dl===null?'#5A5248':dl<0?'#9C3A2B':dl<=3?'#B0892B':'#5A5248';

  const artsHTML=lines.map(l=>renderArt(l,o.id)).join('');

  return `<div class="cmd-card" id="cmd_${o.id}">
    <div class="cmd-header" onclick="togCmd('${o.id}','arr_${o.id}')">
      <div style="flex:1;min-width:0">
        <div class="cmd-no">${o.order_no||'—'}</div>
        <div class="cmd-client">${cl}</div>
        <div class="cmd-meta">
          <span style="color:${dc}">${dl===null?'':dl<0?'+'+Math.abs(dl)+'z întârziere':dl===0?'Azi':dl+'z rămase'}</span>
          ${dl!==null?' · ':''}<span>Livrare: ${dd}</span>
        </div>
      </div>
      <div class="cmd-progress">
        <div class="cmd-progress-num" style="color:${allDone?'#1E4A2E':'#111111'}">${doneCnt}/${lines.length}</div>
        <div class="cmd-progress-label">articole</div>
      </div>
      <svg class="cmd-arrow" id="arr_${o.id}" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
    </div>
    <div class="cmd-body" id="body_${o.id}">
      ${o.notes?`<div style="margin-bottom:10px;padding:8px 10px;background:#FAF3E0;border-left:3px solid #B08D57;border-radius:0 6px 6px 0;font-size:12px;color:#8B6914"><strong>Obs:</strong> ${o.notes}</div>`:''}
      ${artsHTML}
      <button class="btn-finalize" id="fin_${o.id}" onclick="finalizeOrder('${o.id}')" ${allDone?'':'disabled'}>
        <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        ${allDone?'Finalizează — trimite la cusut':'Bifează toate articolele mai întâi'}
      </button>
    </div>
  </div>`;
}

function renderArt(l,orderId){
  const st=artState[l.id]||{done:false,qty_done:l.total_pairs,problem:null};
  const modName=l.products?.code?'Art. '+l.products.code:l.free_model||'—';
  const entries=l.ponytage?Object.entries(l.ponytage).filter(([,q])=>q>0):[];
  const pontajHTML=entries.map(([s,q])=>`<span class="pontaj-chip">${s}×${q}</span>`).join('');
  const notesClean=l.notes?l.notes.replace(/\[Discount:[^\]]+\]\s*/,'').trim():'';

  return `<div class="art-row${st.done?' done':''}${st.problem&&!st.done?' problem':''}" id="art_${l.id}">
    <div class="art-top">
      <div>
        <div class="art-name">${modName}${l.from_stock?'<span style="font-size:9px;background:#E8EFF6;color:#23394F;padding:2px 6px;border-radius:3px;margin-left:6px;font-weight:700">📦 STOC</span>':''}</div>
        <div class="art-color">${l.color||'—'}</div>
        <div class="art-planned">${l.total_pairs} per. planificate</div>
      </div>
    </div>
    <div class="art-pontaj">${pontajHTML||'—'}</div>
    ${notesClean?`<div style="font-size:11px;color:#8B6914;margin-bottom:8px;padding:5px 8px;background:#FAF3E0;border-radius:5px"><strong>Obs:</strong> ${notesClean}</div>`:''}
    <div class="art-actions">
      <div class="qty-input-wrap">
        <label>Per. croite</label>
        <input type="number" class="qty-input" id="qty_${l.id}" value="${st.qty_done}" min="0" max="${l.total_pairs*2}" onchange="setQty('${l.id}',this.value)"/>
      </div>
      <button class="btn-done${st.done?' undone':''}" onclick="toggleDone('${l.id}','${orderId}')">
        <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        ${st.done?'Anulează':'Croit'}
      </button>
      <button class="btn-problem" onclick="openProblem('${orderId}','${l.id}','${modName} · ${l.color||''}')">
        ⚠ Problemă
      </button>
    </div>
    ${st.done?`<div class="art-done-info"><svg class="done-check" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg><span class="done-text">${st.qty_done} perechi croite</span></div>`:''}
    ${st.problem?`<div class="problem-text">⚠ ${st.problem}</div>`:''}
  </div>`;
}

function renderFinalizate(){
  const el=document.getElementById('finList');
  const empty=document.getElementById('finEmpty');
  if(!finOrders.length){el.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';
  el.innerHTML=finOrders.map(o=>{
    const cl=o.clients?.company_name||o.clients?.name||'—';
    const lines=o.order_lines||[];
    return `<div class="cmd-card">
      <div style="padding:14px 16px">
        <div class="cmd-no">${o.order_no||'—'}</div>
        <div class="cmd-client">${cl}</div>
        <div style="margin-top:6px;display:flex;flex-wrap:wrap;gap:4px">
          ${lines.map(l=>`<span style="font-size:11px;background:#EAF0EC;border:1px solid rgba(54,90,67,.2);padding:2px 8px;border-radius:4px;color:#1E4A2E;font-weight:600">${l.products?.code?'Art. '+l.products.code:l.free_model||'—'} · ${l.color||'—'}</span>`).join('')}
        </div>
        <div style="margin-top:8px;font-size:11px;color:#1E4A2E;font-weight:600">✓ Fețe gata — la cusut</div>
      </div>
    </div>`;
  }).join('');
}

// ── TOGGLE EXPAND ─────────────────────────────────────────────
function togCmd(orderId,arrowId){
  const body=document.getElementById('body_'+orderId);
  const arr=document.getElementById(arrowId);
  const open=body.style.display==='block';
  body.style.display=open?'none':'block';
  if(arr)arr.style.transform=open?'rotate(0deg)':'rotate(180deg)';
}

// ── ARTICOL ACTIONS ───────────────────────────────────────────
function setQty(lineId,val){
  const st=artState[lineId]||{done:false,qty_done:0,problem:null};
  st.qty_done=parseInt(val)||0;
  artState[lineId]=st;
}

function toggleDone(lineId,orderId){
  const st=artState[lineId]||{done:false,qty_done:0,problem:null};
  st.done=!st.done;
  if(st.done){
    const qtyEl=document.getElementById('qty_'+lineId);
    if(qtyEl)st.qty_done=parseInt(qtyEl.value)||st.qty_done;
  }
  artState[lineId]=st;
  // Re-render articolul
  const o=orders.find(x=>x.order_lines?.some(l=>l.id===lineId));
  if(!o)return;
  const l=o.order_lines.find(x=>x.id===lineId);
  if(!l)return;
  const artEl=document.getElementById('art_'+lineId);
  if(artEl)artEl.outerHTML=renderArt(l,orderId);
  // Update buton finalizare
  updateFinalizeBtn(orderId);
}

function updateFinalizeBtn(orderId){
  const o=orders.find(x=>x.id===orderId);
  if(!o)return;
  const lines=o.order_lines||[];
  const allDone=lines.length>0&&lines.every(l=>artState[l.id]?.done);
  const btn=document.getElementById('fin_'+orderId);
  if(btn){
    btn.disabled=!allDone;
    btn.innerHTML=`<svg viewBox="0 0 24 24" style="width:16px;height:16px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><polyline points="20 6 9 17 4 12"/></svg>${allDone?'Finalizează — trimite la cusut':'Bifează toate articolele mai întâi'}`;
    // Update progress
    const doneCnt=lines.filter(l=>artState[l.id]?.done).length;
    const card=document.getElementById('cmd_'+orderId);
    if(card){
      const progEl=card.querySelector('.cmd-progress-num');
      if(progEl){progEl.textContent=doneCnt+'/'+lines.length;progEl.style.color=allDone?'#1E4A2E':'#111111';}
    }
  }
}

// ── PROBLEMĂ ──────────────────────────────────────────────────
function openProblem(orderId,lineId,artName){
  problemOrderId=orderId;problemLineId=lineId;
  document.getElementById('problemModalSub').textContent=artName;
  document.getElementById('problemDesc').value='';
  document.getElementById('problemTip').value='material';
  document.getElementById('problemModal').classList.add('show');
}

async function saveProblem(){
  const tip=document.getElementById('problemTip').value;
  const desc=document.getElementById('problemDesc').value.trim();
  if(!desc){showToast('Descrie problema!');return;}
  const tipLabels={material:'Material defect/insuficient',model:'Problemă model/tipar',culoare:'Culoare greșită',alta:'Altă problemă'};
  const text=tipLabels[tip]+': '+desc;
  // Salvează în starea locală
  const st=artState[problemLineId]||{done:false,qty_done:0,problem:null};
  st.problem=text;artState[problemLineId]=st;
  // Trimite mesaj la management
  const o=orders.find(x=>x.id===problemOrderId);
  showLov('Se raportează...');
  await sb.from('internal_messages').insert({
    from_user_id:CU.id,to_department:'management',
    order_id:problemOrderId,
    subject:'Problemă croit — '+(o?.order_no||''),
    message:'Problemă la croit: '+text,
    priority:'urgent',is_read:false,
  });
  hideLov();closeModal('problemModal');showToast('Problemă raportată!');
  // Re-render articolul
  const l=(o?.order_lines||[]).find(x=>x.id===problemLineId);
  if(l){const artEl=document.getElementById('art_'+problemLineId);if(artEl)artEl.outerHTML=renderArt(l,problemOrderId);}
}

// ── FINALIZARE ────────────────────────────────────────────────
async function finalizeOrder(orderId){
  const o=orders.find(x=>x.id===orderId);
  if(!o)return;
  const lines=o.order_lines||[];
  const allDone=lines.every(l=>artState[l.id]?.done);
  if(!allDone){showToast('Bifează toate articolele mai întâi!');return;}
  showLov('Se finalizează...');
  // Actualizează status comandă
  await sb.from('orders').update({
    status:'fete_gata_cusut',
    updated_at:new Date().toISOString(),
  }).eq('id',orderId);
  // Salvează qty_done în audit
  const croitSummary=lines.map(l=>{
    const st=artState[l.id];
    const modName=l.products?.code?'Art. '+l.products.code:l.free_model||'—';
    return modName+' '+l.color+': '+st.qty_done+' per. croite'+(st.problem?' ⚠':'');
  }).join(' | ');
  await sb.from('audit_log').insert({
    table_name:'orders',record_id:orderId,action:'update',
    new_data:{action:'Croit finalizat: '+croitSummary,operator:CP?.full_name||'Croit'},
    done_by:CU.id,
  });
  // Notificare management
  await sb.from('internal_messages').insert({
    from_user_id:CU.id,to_department:'management',
    order_id:orderId,
    subject:'Croit finalizat — '+(o.order_no||''),
    message:'Comanda '+(o.order_no||'')+' a fost croită. '+croitSummary,
    priority:'normal',is_read:false,
  });
  hideLov();showToast('Comanda finalizată — trimisă la cusut!');
  await loadAll();
}

// ── MESAJE ────────────────────────────────────────────────────
async function loadMsgs(){
  const{data}=await sb.from('internal_messages')
    .select(`id,from_user_id,to_department,order_id,message,subject,priority,is_read,reply,created_at,
      user_profiles!internal_messages_from_user_id_fkey(full_name),
      orders(order_no)`)
    .or(`to_department.eq.croit,from_user_id.eq.${CU.id}`)
    .is('parent_id',null)
    .order('created_at',{ascending:false})
    .limit(30);
  const msgs=data||[];
  // Marchează citite
  const unreadIds=msgs.filter(m=>!m.is_read&&m.from_user_id!==CU.id).map(m=>m.id);
  if(unreadIds.length)await sb.from('internal_messages').update({is_read:true,read_at:new Date().toISOString()}).in('id',unreadIds);
  await loadMsgBadge();
  const el=document.getElementById('msgList');
  const empty=document.getElementById('msgEmpty');
  if(!msgs.length){el.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';
  el.innerHTML=msgs.map(m=>{
    const isMine=m.from_user_id===CU.id;
    const isUnread=!m.is_read&&!isMine;
    const isUrgent=m.priority==='urgent';
    const sender=isMine?'Tu → Management':m.user_profiles?.full_name||'Management';
    const t=new Date(m.created_at);
    const timeStr=t.toLocaleDateString('ro-RO')===new Date().toLocaleDateString('ro-RO')
      ?t.toLocaleTimeString('ro-RO',{hour:'2-digit',minute:'2-digit'})
      :t.toLocaleDateString('ro-RO');
    return `<div class="msg-item${isUnread?' unread':''}">
      ${m.orders?`<div class="msg-order">${m.orders.order_no}</div>`:''}
      <div class="msg-from">${sender}${isUrgent?' ⚡':''}</div>
      <div class="msg-preview">${m.subject||m.message.slice(0,80)}</div>
      ${m.reply?`<div style="margin-top:5px;padding:5px 8px;background:#EAF0EC;border-radius:5px;font-size:11px;color:#1E4A2E"><strong>Răspuns:</strong> ${m.reply}</div>`:''}
      <div class="msg-time">${timeStr}</div>
    </div>`;
  }).join('');
}

function openNewMsg(){
  document.getElementById('msgText').value='';
  document.getElementById('msgPriority').value='normal';
  document.getElementById('newMsgModal').classList.add('show');
}

async function sendMsg(){
  const text=document.getElementById('msgText').value.trim();
  const priority=document.getElementById('msgPriority').value;
  if(!text){showToast('Scrie mesajul!');return;}
  showLov('Se trimite...');
  await sb.from('internal_messages').insert({
    from_user_id:CU.id,to_department:'management',
    message:text,priority,is_read:false,
  });
  hideLov();closeModal('newMsgModal');showToast('Mesaj trimis!');loadMsgs();
}

function closeModal(id){document.getElementById(id).classList.remove('show');}
function showLov(t){document.getElementById('lovText').textContent=t||'Se încarcă...';document.getElementById('lov').classList.add('show');}
function hideLov(){document.getElementById('lov').classList.remove('show');}
function showToast(m){const e=document.getElementById('toast');e.textContent=m;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),2500);}
</script>
