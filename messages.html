<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SILESCO · Mesaje</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#F4F1EA;min-height:100vh;color:#111111}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:220px;background:#111111;display:flex;flex-direction:column;z-index:100}
.sidebar-logo{padding:24px 20px 18px}
.sidebar-brand{font-size:9px;color:rgba(255,255,255,.35);letter-spacing:3px;text-transform:uppercase;margin-bottom:6px}
.sidebar-title{font-family:'Playfair Display',serif;font-size:18px;color:#fff;font-weight:700}
.sidebar-divider{height:1px;background:rgba(255,255,255,.08);margin:0 16px 12px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;border-radius:6px;margin:1px 8px;cursor:pointer;transition:background .15s}
.nav-item:hover{background:rgba(255,255,255,.06)}
.nav-item.active{background:rgba(176,141,87,.18)}
.nav-item svg{width:15px;height:15px;stroke:rgba(255,255,255,.4);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.nav-item.active svg{stroke:#B08D57}
.nav-item span{font-size:12px;color:rgba(255,255,255,.5);font-weight:500}
.nav-item.active span{color:#fff;font-weight:600}
.nav-badge{margin-left:auto;background:#9C3A2B;color:#fff;font-size:9px;font-weight:700;border-radius:10px;padding:2px 6px}
.sidebar-bottom{margin-top:auto;padding:14px 16px;border-top:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px}
.user-name{font-size:12px;color:rgba(255,255,255,.7);font-weight:600}
.user-role{font-size:10px;color:rgba(255,255,255,.3)}
.main{margin-left:220px;min-height:100vh;display:flex;flex-direction:column}
.topbar{background:#fff;border-bottom:1px solid #DDD7CE;padding:12px 28px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:50}
.page-title{font-family:'Playfair Display',serif;font-size:20px;color:#111111;font-weight:700}
.content{padding:0;flex:1;display:grid;grid-template-columns:340px 1fr;height:calc(100vh - 57px)}

/* CONVERSATIONS LIST */
.conv-list{background:#fff;border-right:1px solid #DDD7CE;overflow-y:auto;display:flex;flex-direction:column}
.conv-list-header{padding:14px 16px;border-bottom:1px solid #DDD7CE;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff;z-index:10}
.conv-list-title{font-size:13px;font-weight:700;color:#111111}
.conv-search{width:100%;padding:8px 12px;border:1.5px solid #DDD7CE;border-radius:7px;font-size:13px;font-family:'Inter',sans-serif;color:#111111;outline:none;margin:10px 16px;width:calc(100% - 32px)}
.conv-search:focus{border-color:#B08D57}

/* CONVERSATION ITEM */
.conv-item{padding:14px 16px;border-bottom:1px solid #EDE8DF;cursor:pointer;transition:background .1s;position:relative}
.conv-item:hover{background:#FAFAF8}
.conv-item.active{background:#F6F0E5;border-left:3px solid #B08D57}
.conv-item.unread{background:#FFF9F0}
.conv-order{font-size:10px;font-weight:700;color:#8B6914;font-family:'Courier New',monospace;margin-bottom:3px}
.conv-client{font-size:14px;font-weight:700;color:#111111;margin-bottom:2px}
.conv-preview{font-size:12px;color:#5A5248;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:260px}
.conv-meta{display:flex;justify-content:space-between;align-items:center;margin-top:4px}
.conv-time{font-size:10px;color:#9E9890}
.conv-badge{background:#9C3A2B;color:#fff;font-size:9px;font-weight:700;border-radius:10px;padding:1px 6px}
.conv-dept{font-size:9px;color:#5A5248;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.conv-actions{display:none;position:absolute;top:8px;right:8px;gap:4px}
.conv-item:hover .conv-actions{display:flex}
.conv-del{background:#F5EAE8;border:1px solid rgba(156,58,43,.2);border-radius:5px;color:#9C3A2B;font-size:10px;font-weight:700;cursor:pointer;padding:3px 7px;font-family:'Inter',sans-serif}

/* GENERAL NOTIFS */
.notif-item{padding:12px 16px;border-bottom:1px solid #EDE8DF;cursor:pointer;transition:background .1s}
.notif-item:hover{background:#FAFAF8}
.notif-item.active{background:#F6F0E5;border-left:3px solid #B08D57}
.notif-badge-urgent{font-size:9px;font-weight:700;color:#7A2418;background:#F5EAE8;border:1px solid rgba(156,58,43,.2);padding:1px 6px;border-radius:3px}

/* CHAT VIEW */
.chat-view{display:flex;flex-direction:column;height:100%}
.chat-header{background:#fff;border-bottom:1px solid #DDD7CE;padding:14px 20px;display:flex;justify-content:space-between;align-items:flex-start}
.chat-header-info{flex:1}
.chat-order-no{font-size:10px;font-weight:700;color:#8B6914;font-family:'Courier New',monospace;margin-bottom:3px}
.chat-client{font-family:'Playfair Display',serif;font-size:16px;color:#111111;font-weight:700}
.chat-dept{font-size:11px;color:#5A5248;margin-top:2px}
.chat-del-conv{background:none;border:none;cursor:pointer;padding:6px;color:#C8C0B8}
.chat-del-conv:hover{color:#9C3A2B}
.chat-del-conv svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.chat-msgs{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:10px;background:#F4F1EA}
.bubble{max-width:75%;padding:11px 14px;border-radius:12px;position:relative}
.bubble.sent{align-self:flex-end;background:#111111;color:#fff;border-bottom-right-radius:3px}
.bubble.received{align-self:flex-start;background:#fff;border-bottom-left-radius:3px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.bubble-from{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px;opacity:.6}
.bubble-text{font-size:13px;line-height:1.5}
.bubble.sent .bubble-text{color:#fff}
.bubble-time{font-size:9px;opacity:.5;margin-top:5px}
.bubble-del{position:absolute;top:4px;right:4px;background:none;border:none;cursor:pointer;opacity:0;color:rgba(255,255,255,.6);font-size:14px;transition:opacity .15s;font-family:'Inter',sans-serif}
.bubble:hover .bubble-del{opacity:1}
.bubble.received .bubble-del{color:rgba(0,0,0,.3)}
.chat-compose{background:#fff;border-top:1px solid #DDD7CE;padding:14px 20px;display:flex;gap:10px;align-items:flex-end}
.compose-textarea{flex:1;padding:10px 14px;border:1.5px solid #C8C0B8;border-radius:10px;font-size:14px;font-family:'Inter',sans-serif;color:#111111;outline:none;resize:none;min-height:44px;max-height:120px;line-height:1.5}
.compose-textarea:focus{border-color:#B08D57}
.compose-send{width:44px;height:44px;border-radius:10px;border:none;background:#111111;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s}
.compose-send:hover{background:#2a2a2a}
.compose-send svg{width:16px;height:16px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.compose-dept{font-size:11px;color:#5A5248;margin-bottom:6px}
.compose-dept select{padding:4px 8px;border-radius:5px;border:1px solid #DDD7CE;font-size:11px;font-family:'Inter',sans-serif;color:#111111;outline:none;background:#fff}

/* EMPTY */
.chat-empty{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;background:#F4F1EA;color:#9E9890}
.chat-empty svg{width:40px;height:40px;stroke:#DDD7CE;fill:none;stroke-width:1.5}

/* NEW MSG MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal-box{background:#fff;border-radius:12px;padding:28px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto}
.modal-title{font-family:'Playfair Display',serif;font-size:20px;color:#111111;margin-bottom:20px;font-weight:700}
.fld{margin-bottom:14px}
.fld label{display:block;font-size:10px;font-weight:700;color:#3A3530;text-transform:uppercase;letter-spacing:1px;margin-bottom:7px}
.fld select,.fld input,.fld textarea{width:100%;padding:11px 13px;border:1.5px solid #C8C0B8;border-radius:7px;font-size:14px;font-family:'Inter',sans-serif;color:#111111;outline:none;background:#fff}
.fld textarea{resize:none;height:90px}
.fld select:focus,.fld input:focus,.fld textarea:focus{border-color:#B08D57}
.ac-wrap{position:relative}
.ac-drop{display:none;position:absolute;top:100%;left:0;right:0;background:#fff;border:1.5px solid #B08D57;border-top:none;border-radius:0 0 7px 7px;z-index:50;max-height:180px;overflow-y:auto;box-shadow:0 6px 16px rgba(0,0,0,.1)}
.ac-item{padding:10px 13px;cursor:pointer;font-size:13px;border-bottom:1px solid #F4F1EA;display:flex;gap:8px}
.ac-item:hover{background:#F6F0E5}
.btn-send{width:100%;padding:13px;border-radius:8px;border:none;background:#111111;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;margin-bottom:8px}
.btn-cancel{width:100%;padding:12px;border-radius:8px;border:1.5px solid #C8C0B8;background:#fff;color:#3A3530;font-size:13px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif}
.lov{display:none;position:fixed;inset:0;background:rgba(244,241,234,.96);z-index:999;align-items:center;justify-content:center;flex-direction:column;gap:14px}
.lov.show{display:flex}
.spinner{width:32px;height:32px;border:2px solid #DDD7CE;border-top-color:#B08D57;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.lov-text{font-size:13px;color:#2A2A2A;font-weight:600}
.toast{position:fixed;bottom:24px;right:24px;background:#111111;color:#fff;padding:12px 20px;border-radius:8px;font-size:13px;font-weight:700;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:99}
@media(max-width:900px){.sidebar{transform:translateX(-100%);transition:transform .25s}.sidebar.open{transform:translateX(0)}.main{margin-left:0}.content{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="lov" id="lov"><div class="spinner"></div><div class="lov-text" id="lovText">Se încarcă...</div></div>
<div class="toast" id="toast"></div>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar(false)"></div>

<!-- MODAL MESAJ NOU -->
<div class="modal-overlay" id="newMsgModal">
  <div class="modal-box">
    <div class="modal-title">Mesaj nou</div>
    <div class="fld">
      <label>Către departament</label>
      <select id="nmDept">
        <option value="agent">Agent</option>
        <option value="croit">Croit</option>
        <option value="talpuit">Talpuit</option>
        <option value="impachetat">Împachetat</option>
        <option value="birou">Birou</option>
        <option value="all">Toate departamentele</option>
      </select>
    </div>
    <div class="fld"><label>Prioritate</label>
      <select id="nmPriority"><option value="normal">Normală</option><option value="urgent">Urgentă ⚡</option></select>
    </div>
    <div class="fld ac-wrap">
      <label>Comandă asociată <span style="color:#9E9890;font-weight:400;text-transform:none;letter-spacing:0">(opțional)</span></label>
      <input type="text" id="nmOrderInput" placeholder="Caută după număr sau client..." oninput="filterOrdersAc(this.value)" onfocus="filterOrdersAc(this.value)" autocomplete="off"/>
      <input type="hidden" id="nmOrderId"/>
      <div class="ac-drop" id="nmOrderDrop"></div>
    </div>
    <div class="fld"><label>Subiect <span style="color:#9E9890;font-weight:400;text-transform:none;letter-spacing:0">(opțional)</span></label>
      <input type="text" id="nmSubject" placeholder="ex: Urgență la croit"/>
    </div>
    <div class="fld"><label>Mesaj</label>
      <textarea id="nmMessage" placeholder="Scrie mesajul..."></textarea>
    </div>
    <button class="btn-send" onclick="sendNewMsg()">Trimite mesajul</button>
    <button class="btn-cancel" onclick="closeModal('newMsgModal')">Anulează</button>
  </div>
</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="sidebar-brand">SILESCO</div>
    <div class="sidebar-title">Management</div>
  </div>
  <div class="sidebar-divider"></div>
  <div style="padding:0 8px;flex:1;overflow-y:auto">
    <div class="nav-item" onclick="window.location.href='/management.html'">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      <span>Comenzi</span>
    </div>
    <div class="nav-item active">
      <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <span>Mesaje</span>
    </div>
  </div>
  <div class="sidebar-bottom">
    <div style="width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center">
      <svg style="width:14px;height:14px;stroke:rgba(255,255,255,.5);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    </div>
    <div><div class="user-name" id="userName">—</div><div class="user-role">Management</div></div>
    <button onclick="doLogout()" style="margin-left:auto;background:none;border:none;cursor:pointer;padding:4px">
      <svg style="width:14px;height:14px;stroke:rgba(255,255,255,.35);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    </button>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:8px">
      <div class="page-title">Mesaje</div>
    </div>
    <div style="display:flex;gap:8px">
      <button onclick="loadAll()" style="padding:8px 14px;border-radius:7px;border:1.5px solid #C8C0B8;background:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif">Reîncarcă</button>
      <button onclick="openNewMsg()" style="padding:8px 16px;border-radius:7px;border:none;background:#111111;color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif">+ Mesaj nou</button>
    </div>
  </div>
  <div class="content">
    <!-- LISTA CONVERSAȚII -->
    <div class="conv-list">
      <div class="conv-list-header">
        <div class="conv-list-title">Conversații</div>
        <span id="unreadBadge" style="font-size:11px;color:#5A5248;font-weight:600"></span>
      </div>
      <input class="conv-search" id="convSearch" placeholder="Caută..." oninput="filterConvs(this.value)"/>
      <div id="convList"></div>
    </div>
    <!-- CHAT -->
    <div class="chat-view" id="chatView">
      <div class="chat-empty" id="chatEmpty">
        <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <div style="font-size:14px;font-weight:600">Selectează o conversație</div>
        <div style="font-size:12px;color:#C8C0B8">sau trimite un mesaj nou</div>
      </div>
      <div id="chatContent" style="display:none;flex:1;flex-direction:column;overflow:hidden">
        <div class="chat-header">
          <div class="chat-header-info">
            <div class="chat-order-no" id="chatOrderNo"></div>
            <div class="chat-client" id="chatClient"></div>
            <div class="chat-dept" id="chatDept"></div>
          </div>
          <button class="chat-del-conv" onclick="deleteConversation()" title="Șterge conversația">
            <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
          </button>
        </div>
        <div class="chat-msgs" id="chatMsgs"></div>
        <div class="chat-compose">
          <div style="flex:1">
            <div class="compose-dept">
              Răspunde ca: Management → 
              <select id="replyDept" style="padding:3px 8px;border-radius:5px;border:1px solid #DDD7CE;font-size:11px;font-family:'Inter',sans-serif;color:#111111;outline:none;background:#fff">
                <option value="agent">Agent</option>
                <option value="croit">Croit</option>
                <option value="talpuit">Talpuit</option>
                <option value="impachetat">Împachetat</option>
                <option value="all">Toate</option>
              </select>
            </div>
            <textarea class="compose-textarea" id="replyInput" placeholder="Scrie răspunsul... (Enter = trimite, Shift+Enter = linie nouă)"
              onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendReply();}"
              oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px'"></textarea>
          </div>
          <button class="compose-send" onclick="sendReply()">
            <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const SURL='https://nprpwaxijtbjkxdhdxmq.supabase.co';
const SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5wcnB3YXhpanRiamt4ZGhkeG1xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5ODc3MzIsImV4cCI6MjA5NTU2MzczMn0.Ae8_C-3ke-KBTgIy9xcJZeDNFaR3Q9vTkoPxC6AbAg0';
const{createClient}=supabase;
const sb=createClient(SURL,SKEY);

let CU=null,CP=null,allMsgs=[],filteredConvs=[],orders=[];
let activeOrderId=null,activeGeneralId=null;
const DEPT={agent:'Agent',croit:'Croit',talpuit:'Talpuit',impachetat:'Împachetat',birou:'Birou',management:'Management',all:'Toate'};

window.addEventListener('DOMContentLoaded',async()=>{
  const{data:{session}}=await sb.auth.getSession();
  if(!session){window.location.href='/index.html';return;}
  CU=session.user;
  const{data:p}=await sb.from('user_profiles').select('full_name,role').eq('id',CU.id).single();
  CP=p;
  if(p?.role!=='management'){window.location.href='/index.html';return;}
  document.getElementById('userName').textContent=p?.full_name||'Management';
  sb.auth.onAuthStateChange(ev=>{if(ev==='SIGNED_OUT')window.location.href='/index.html';});
  document.addEventListener('click',e=>{
    if(!e.target.closest('#nmOrderDrop')&&e.target.id!=='nmOrderInput')document.getElementById('nmOrderDrop').style.display='none';
  });
  await loadAll();
});
async function doLogout(){await sb.auth.signOut();}
function toggleSidebar(o){document.getElementById('sidebar').classList.toggle('open',o);document.getElementById('sidebarOverlay').classList.toggle('show',o);}

async function loadAll(){
  showLov('Se încarcă...');
  await Promise.all([loadMsgs(),loadOrders()]);
  hideLov();
}

async function loadOrders(){
  const{data}=await sb.from('orders').select('id,order_no,clients!orders_client_id_fkey(name,company_name)').order('created_at',{ascending:false}).limit(100);
  orders=data||[];
}

async function loadMsgs(){
  // Încarcă toate mesajele root (parent_id null) — exclude mesajele automate de sistem
  const autoSubjects=['Croit finalizat','Modificare în așteptare','Modificări aprobate','Modificări respinse'];
  const{data}=await sb.from('internal_messages')
    .select(`id,from_user_id,to_department,order_id,message,subject,priority,is_read,created_at,parent_id,
      user_profiles!internal_messages_from_user_id_fkey(full_name,role),
      orders(order_no,clients!orders_client_id_fkey(name,company_name))`)
    .is('parent_id',null)
    .not('subject','like','Croit finalizat%')
    .not('subject','like','Modificări aprobate%')
    .not('subject','like','Modificări respinse%')
    .order('created_at',{ascending:false});
  allMsgs=data||[];

  // Grupează pe order_id sau ca generale
  buildConversations();
}

// Construiește conversații grupate pe comandă
let conversations=[];
function buildConversations(){
  const byOrder={};
  const general=[];
  allMsgs.forEach(m=>{
    if(m.order_id){
      if(!byOrder[m.order_id])byOrder[m.order_id]=[];
      byOrder[m.order_id].push(m);
    }else{
      general.push(m);
    }
  });
  conversations=[];
  // Conversații per comandă
  Object.entries(byOrder).forEach(([orderId,msgs])=>{
    const latest=msgs[0];
    const unread=msgs.filter(m=>!m.is_read&&m.from_user_id!==CU.id).length;
    conversations.push({
      type:'order',orderId,
      orderNo:latest.orders?.order_no||'—',
      client:latest.orders?.clients?.company_name||latest.orders?.clients?.name||'—',
      lastMsg:latest.message,lastTime:latest.created_at,
      dept:latest.to_department,unread,msgs,
    });
  });
  // Mesaje generale (fără comandă)
  general.forEach(m=>{
    const unread=!m.is_read&&m.from_user_id!==CU.id?1:0;
    conversations.push({
      type:'general',id:m.id,
      subject:m.subject||m.message.slice(0,50),
      lastMsg:m.message,lastTime:m.created_at,
      dept:m.to_department,unread,
      from:m.user_profiles?.full_name||'—',
      isMine:m.from_user_id===CU.id,
    });
  });
  // Sortează după data ultimului mesaj
  conversations.sort((a,b)=>new Date(b.lastTime)-new Date(a.lastTime));
  filteredConvs=[...conversations];
  renderUnread();
  renderConvList();
}

function renderUnread(){
  const total=conversations.reduce((s,c)=>s+c.unread,0);
  document.getElementById('unreadBadge').textContent=total>0?total+' necitite':'';
}

function filterConvs(q){
  const qt=q.toLowerCase().trim();
  filteredConvs=qt?conversations.filter(c=>{
    const s=(c.orderNo||'')+(c.client||'')+(c.subject||'')+(c.lastMsg||'');
    return s.toLowerCase().includes(qt);
  }):[...conversations];
  renderConvList();
}

function renderConvList(){
  const el=document.getElementById('convList');
  if(!filteredConvs.length){
    el.innerHTML='<div style="padding:32px;text-align:center;color:#9E9890;font-size:12px;font-weight:500">Nicio conversație.</div>';
    return;
  }
  el.innerHTML=filteredConvs.map((c,i)=>{
    const t=new Date(c.lastTime);
    const timeStr=t.toLocaleDateString('ro-RO')===new Date().toLocaleDateString('ro-RO')
      ?t.toLocaleTimeString('ro-RO',{hour:'2-digit',minute:'2-digit'})
      :t.toLocaleDateString('ro-RO');
    const isActive=c.type==='order'?c.orderId===activeOrderId:c.id===activeGeneralId;
    if(c.type==='order'){
      return `<div class="conv-item${c.unread?' unread':''}${isActive?' active':''}" onclick="openOrderConv('${c.orderId}')">
        <div class="conv-order">${c.orderNo}</div>
        <div class="conv-client">${c.client}</div>
        <div class="conv-preview">${c.lastMsg}</div>
        <div class="conv-meta">
          <span class="conv-dept">${DEPT[c.dept]||c.dept}</span>
          <span class="conv-time">${timeStr}</span>
          ${c.unread?`<span class="conv-badge">${c.unread}</span>`:''}
        </div>
        <div class="conv-actions">
          <button class="conv-del" onclick="deleteOrderConv(event,'${c.orderId}')">Șterge tot</button>
        </div>
      </div>`;
    }else{
      return `<div class="conv-item${c.unread?' unread':''}${isActive?' active':''}" onclick="openGeneralMsg('${c.id}')">
        <div class="conv-client">${c.isMine?'Tu → '+DEPT[c.dept]:c.from}</div>
        <div class="conv-preview">${c.subject||c.lastMsg}</div>
        <div class="conv-meta">
          <span class="conv-dept">${c.isMine?'→ '+DEPT[c.dept]:'General'}</span>
          <span class="conv-time">${timeStr}</span>
          ${c.unread?`<span class="conv-badge">${c.unread}</span>`:''}
        </div>
        <div class="conv-actions">
          <button class="conv-del" onclick="deleteMsg(event,'${c.id}')">Șterge</button>
        </div>
      </div>`;
    }
  }).join('');
}

// ── OPEN ORDER CONVERSATION ───────────────────────────────────
async function openOrderConv(orderId){
  activeOrderId=orderId;activeGeneralId=null;
  renderConvList();
  showLov('Se încarcă conversația...');
  // Fetch toate mesajele legate de comandă (root + replies)
  const{data:root}=await sb.from('internal_messages')
    .select(`id,from_user_id,to_department,message,subject,priority,is_read,created_at,parent_id,
      user_profiles!internal_messages_from_user_id_fkey(full_name,role)`)
    .eq('order_id',orderId).is('parent_id',null)
    .order('created_at',{ascending:true});
  // Fetch replies pentru fiecare
  const rootIds=(root||[]).map(m=>m.id);
  let replies=[];
  if(rootIds.length){
    const{data:rep}=await sb.from('internal_messages')
      .select(`id,from_user_id,to_department,message,created_at,parent_id,
        user_profiles!internal_messages_from_user_id_fkey(full_name,role)`)
      .in('parent_id',rootIds).order('created_at',{ascending:true});
    replies=rep||[];
  }
  // Combină și sortează cronologic
  const allThread=[...(root||[]),...replies].sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));
  hideLov();
  // Marchează ca citite
  const unreadIds=(root||[]).filter(m=>!m.is_read&&m.from_user_id!==CU.id).map(m=>m.id);
  if(unreadIds.length)await sb.from('internal_messages').update({is_read:true,read_at:new Date().toISOString()}).in('id',unreadIds);
  // Header
  const conv=conversations.find(c=>c.orderId===orderId);
  document.getElementById('chatOrderNo').textContent=conv?.orderNo||'—';
  document.getElementById('chatClient').textContent=conv?.client||'—';
  document.getElementById('chatDept').textContent='Conversație despre comandă';
  // Set reply dept
  if(conv?.dept)document.getElementById('replyDept').value=conv.dept==='management'?'agent':conv.dept;
  renderChat(allThread);
  await loadMsgs(); // refresh badges
}

// ── OPEN GENERAL MSG ──────────────────────────────────────────
async function openGeneralMsg(id){
  activeGeneralId=id;activeOrderId=null;
  renderConvList();
  showLov('Se încarcă...');
  const{data:root}=await sb.from('internal_messages')
    .select(`id,from_user_id,to_department,message,subject,priority,is_read,created_at,parent_id,
      user_profiles!internal_messages_from_user_id_fkey(full_name,role)`)
    .eq('id',id).single();
  const{data:replies}=await sb.from('internal_messages')
    .select(`id,from_user_id,to_department,message,created_at,parent_id,
      user_profiles!internal_messages_from_user_id_fkey(full_name,role)`)
    .eq('parent_id',id).order('created_at',{ascending:true});
  const allThread=[root,...(replies||[])];
  hideLov();
  if(!root.is_read&&root.from_user_id!==CU.id)
    await sb.from('internal_messages').update({is_read:true,read_at:new Date().toISOString()}).eq('id',id);
  document.getElementById('chatOrderNo').textContent='';
  document.getElementById('chatClient').textContent=root.subject||root.message.slice(0,50);
  document.getElementById('chatDept').textContent='Mesaj general → '+(DEPT[root.to_department]||root.to_department);
  document.getElementById('replyDept').value=root.to_department==='management'?'agent':root.to_department;
  renderChat(allThread);
  await loadMsgs();
}

function renderChat(msgs){
  document.getElementById('chatEmpty').style.display='none';
  const cc=document.getElementById('chatContent');cc.style.display='flex';cc.style.flexDirection='column';
  const el=document.getElementById('chatMsgs');
  el.innerHTML=msgs.map(m=>{
    const isMine=m.from_user_id===CU.id;
    const sender=isMine?'Tu (Management)':m.user_profiles?.full_name||'—'+(m.user_profiles?.role?' · '+m.user_profiles.role:'');
    const t=new Date(m.created_at).toLocaleString('ro-RO');
    const isUrgent=m.priority==='urgent';
    return `<div class="bubble ${isMine?'sent':'received'}">
      <button class="bubble-del" onclick="deleteSingleMsg('${m.id}')" title="Șterge">×</button>
      <div class="bubble-from">${sender}${isUrgent?' ⚡':''}</div>
      <div class="bubble-text">${m.message}</div>
      <div class="bubble-time">${t}</div>
    </div>`;
  }).join('');
  setTimeout(()=>{el.scrollTop=el.scrollHeight;},50);
  document.getElementById('replyInput').value='';
}

// ── SEND REPLY ────────────────────────────────────────────────
async function sendReply(){
  const text=document.getElementById('replyInput').value.trim();
  if(!text)return;
  const dept=document.getElementById('replyDept').value;
  showLov('Se trimite...');
  if(activeOrderId){
    // Trimite ca mesaj nou în conversația comenzii
    const depts=dept==='all'?['agent','croit','talpuit','impachetat','birou']:[dept];
    await Promise.all(depts.map(d=>sb.from('internal_messages').insert({
      from_user_id:CU.id,to_department:d,order_id:activeOrderId,
      message:text,priority:'normal',is_read:false,
    })));
    hideLov();document.getElementById('replyInput').value='';
    await openOrderConv(activeOrderId);
  }else if(activeGeneralId){
    await sb.from('internal_messages').insert({
      from_user_id:CU.id,to_department:dept,
      message:text,priority:'normal',is_read:false,parent_id:activeGeneralId,
    });
    hideLov();document.getElementById('replyInput').value='';
    await openGeneralMsg(activeGeneralId);
  }
  showToast('Mesaj trimis!');
}

// ── ȘTERGERE ──────────────────────────────────────────────────
async function deleteSingleMsg(id){
  if(!confirm('Ștergi acest mesaj?'))return;
  showLov('Se șterge...');
  await sb.from('internal_messages').delete().eq('id',id);
  hideLov();showToast('Mesaj șters.');
  if(activeOrderId)await openOrderConv(activeOrderId);
  else if(activeGeneralId)await openGeneralMsg(activeGeneralId);
  await loadMsgs();
}

async function deleteOrderConv(e,orderId){
  e.stopPropagation();
  if(!confirm('Ștergi toată conversația despre această comandă?'))return;
  showLov('Se șterge...');
  await sb.from('internal_messages').delete().eq('order_id',orderId);
  hideLov();
  if(activeOrderId===orderId){activeOrderId=null;document.getElementById('chatEmpty').style.display='flex';document.getElementById('chatContent').style.display='none';}
  showToast('Conversație ștearsă.');await loadMsgs();
}

async function deleteMsg(e,id){
  e.stopPropagation();
  if(!confirm('Ștergi acest mesaj?'))return;
  showLov('Se șterge...');
  // Șterge și replies
  await sb.from('internal_messages').delete().eq('parent_id',id);
  await sb.from('internal_messages').delete().eq('id',id);
  hideLov();showToast('Mesaj șters.');
  if(activeGeneralId===id){activeGeneralId=null;document.getElementById('chatEmpty').style.display='flex';document.getElementById('chatContent').style.display='none';}
  await loadMsgs();
}

async function deleteConversation(){
  if(activeOrderId){await deleteOrderConv({stopPropagation:()=>{}},activeOrderId);}
  else if(activeGeneralId){await deleteMsg({stopPropagation:()=>{}},activeGeneralId);}
}

// ── NEW MSG ───────────────────────────────────────────────────
function openNewMsg(orderId=null,orderNo=null){
  document.getElementById('nmDept').value='agent';
  document.getElementById('nmPriority').value='normal';
  document.getElementById('nmOrderInput').value=orderNo||'';
  document.getElementById('nmOrderId').value=orderId||'';
  document.getElementById('nmSubject').value='';
  document.getElementById('nmMessage').value='';
  document.getElementById('newMsgModal').classList.add('show');
}
async function sendNewMsg(){
  const dept=document.getElementById('nmDept').value;
  const priority=document.getElementById('nmPriority').value;
  const orderId=document.getElementById('nmOrderId').value||null;
  const subject=document.getElementById('nmSubject').value.trim()||null;
  const message=document.getElementById('nmMessage').value.trim();
  if(!message){showToast('Scrie mesajul!');return;}
  showLov('Se trimite...');
  const depts=dept==='all'?['agent','croit','talpuit','impachetat','birou']:[dept];
  await Promise.all(depts.map(d=>sb.from('internal_messages').insert({
    from_user_id:CU.id,to_department:d,order_id:orderId,subject,message,priority,is_read:false,
  })));
  hideLov();closeModal('newMsgModal');showToast('Mesaj trimis!');
  await loadMsgs();
  if(orderId)await openOrderConv(orderId);
}

function filterOrdersAc(q){
  const d=document.getElementById('nmOrderDrop');
  const f=q.trim()?orders.filter(o=>(o.order_no||'').toLowerCase().includes(q.toLowerCase())||(o.clients?.company_name||o.clients?.name||'').toLowerCase().includes(q.toLowerCase())):orders;
  if(!f.length){d.style.display='none';return;}
  d.style.display='block';
  d.innerHTML=f.slice(0,8).map(o=>`<div class="ac-item" onclick="selOrderAc('${o.id}','${o.order_no}')"><span style="font-weight:700;font-family:monospace;font-size:12px">${o.order_no}</span><span style="font-size:11px;color:#5A5248">${o.clients?.company_name||o.clients?.name||''}</span></div>`).join('');
}
function selOrderAc(id,no){document.getElementById('nmOrderId').value=id;document.getElementById('nmOrderInput').value=no;document.getElementById('nmOrderDrop').style.display='none';}

function closeModal(id){document.getElementById(id).classList.remove('show');}
function showLov(t){document.getElementById('lovText').textContent=t||'Se încarcă...';document.getElementById('lov').classList.add('show');}
function hideLov(){document.getElementById('lov').classList.remove('show');}
function showToast(m){const e=document.getElementById('toast');e.textContent=m;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),3000);}
</script>
