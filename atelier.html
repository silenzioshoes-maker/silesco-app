<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SILESCO · Atelier</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>

/* ── MOBILE RESET ───────────────────────────────── */
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{font-size:16px}
body{font-family:Inter,system-ui,sans-serif;background:#F4F1EA;color:#111;min-height:100vh;-webkit-text-size-adjust:100%}

/* ── HEADER ─────────────────────────────────────── */
.hdr{background:#111;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}
.hdr-brand{font-size:10px;color:rgba(255,255,255,.6);letter-spacing:2px;text-transform:uppercase;margin-bottom:2px}
.hdr-title{font-size:20px;color:#fff;font-weight:800;font-family:Inter,sans-serif}
.hdr-ws{font-size:13px;color:#B08D57;font-weight:700;margin-top:2px}
.hdr-reload{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:8px;padding:10px 16px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:Inter,sans-serif;min-height:44px}

/* ── CARDS ──────────────────────────────────────── */
.content{padding:12px;max-width:640px;margin:0 auto}
.card{background:#fff;border:1px solid #DDD7CE;border-radius:12px;margin-bottom:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.card-header{padding:16px}
.order-no{font-size:11px;font-family:monospace;color:#5A5248;margin-bottom:4px;letter-spacing:.5px}
.client{font-size:20px;color:#111;font-weight:800;margin-bottom:4px;font-family:Inter,sans-serif;line-height:1.2}
.deadline{font-size:13px;color:#5A5248;font-weight:500}

/* ── ART ROW ────────────────────────────────────── */
.art-row{padding:16px;border-top:1px solid #EDE8DF;display:flex;flex-direction:column;gap:12px}
.art-info{}
.art-name{font-size:16px;font-weight:800;color:#111}
.art-color{font-size:14px;color:#5A5248;margin-top:3px;font-weight:500}
.art-total{font-size:15px;font-weight:700;color:#1E4A2E;margin-top:4px}
.pontaj{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.pchip{background:#F4F1EA;border:1px solid #C8C0B8;border-radius:6px;padding:5px 10px;font-size:13px;font-weight:700;color:#111;font-family:monospace}
.art-status{display:flex;align-items:center}

/* ── BUTOANE PRINCIPALE ─────────────────────────── */
.btn-done{width:100%;padding:16px;border-radius:10px;border:none;background:#1E4A2E;color:#fff;font-size:16px;font-weight:700;cursor:pointer;font-family:Inter,sans-serif;min-height:52px;letter-spacing:.3px}
.btn-done:active{background:#163a22}
.btn-done:disabled{background:#C8C0B8;cursor:not-allowed}
.status-done{display:inline-block;font-size:13px;font-weight:700;color:#1E4A2E;background:#EAF0EC;padding:8px 14px;border-radius:8px;border:1px solid #C8DEC8}

/* ── CARD FOOTER ────────────────────────────────── */
.card-footer{padding:14px 16px;background:#EAF0EC;border-top:1px solid #C8DEC8}
.card-footer span{font-size:14px;font-weight:700;color:#1E4A2E}

/* ── EMPTY STATE ────────────────────────────────── */
.empty{text-align:center;padding:60px 20px;color:#9E9890}
.empty svg{width:48px;height:48px;stroke:#DDD7CE;fill:none;stroke-width:1.5;margin:0 auto 20px;display:block}
.empty h3{font-size:18px;font-weight:700;color:#111;margin-bottom:8px}
.empty p{font-size:14px;color:#5A5248}

/* ── LOADING ────────────────────────────────────── */
.lov{display:none;position:fixed;inset:0;background:rgba(244,241,234,.96);z-index:999;align-items:center;justify-content:center;flex-direction:column;gap:16px}
.lov.show{display:flex}
.spinner{width:36px;height:36px;border:3px solid #DDD7CE;border-top-color:#B08D57;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.lov-text{font-size:15px;color:#111;font-weight:700;font-family:Inter,sans-serif}

/* ── TOAST ──────────────────────────────────────── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#111;color:#fff;padding:14px 22px;border-radius:10px;font-size:14px;font-weight:700;white-space:nowrap;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;max-width:90vw;text-align:center}
.toast.show{opacity:1}

/* ── INVALID ────────────────────────────────────── */
.invalid{text-align:center;padding:60px 20px}
.invalid h2{font-size:22px;color:#7A2418;margin-bottom:12px;font-weight:800}
.invalid p{font-size:15px;color:#5A5248}

/* ── ISTORIC ────────────────────────────────────── */
#btnIstoric{width:100%;padding:16px;border-radius:10px;border:1px solid #DDD7CE;background:#fff;color:#5A5248;font-size:15px;font-weight:700;cursor:pointer;font-family:Inter,sans-serif;min-height:52px}

/* ── SPECIFIC ─── */

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#F4F1EA;min-height:100vh;color:#111111}
.hdr{background:#111111;padding:16px 20px;display:flex;justify-content:space-between;align-items:center}
.hdr-brand{font-size:9px;color:rgba(255,255,255,.3);letter-spacing:2.5px;text-transform:uppercase;margin-bottom:3px}
.hdr-title{font-family:Inter,sans-serif;font-size:20px;color:#fff;font-weight:700}
.hdr-ws{font-size:12px;color:#B08D57;font-weight:600;margin-top:2px}
.content{padding:20px;max-width:600px;margin:0 auto}
.card{background:#fff;border:1px solid #DDD7CE;border-radius:10px;margin-bottom:12px;overflow:hidden}
.card-header{padding:14px 16px;border-bottom:1px solid #EDE8DF}
.order-no{font-size:10px;font-family:monospace;color:#5A5248;margin-bottom:3px}
.client{font-family:Inter,sans-serif;font-size:17px;color:#111111;margin-bottom:4px}
.deadline{font-size:11px;color:#5A5248}
.art-row{padding:12px 16px;border-bottom:1px solid #EDE8DF;display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.art-row:last-child{border-bottom:none}
.art-info{flex:1}
.art-name{font-size:14px;font-weight:700;color:#111111}
.art-color{font-size:12px;color:#5A5248;margin-top:2px}
.art-total{font-size:13px;font-weight:600;color:#1E4A2E;margin-top:3px}
.pontaj{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px}
.pchip{background:#F4F1EA;border:1px solid #DDD7CE;border-radius:4px;padding:2px 7px;font-size:11px;font-weight:700;color:#111111;font-family:monospace}
.art-status{flex-shrink:0}
.status-done{font-size:11px;font-weight:700;color:#1E4A2E;background:#EAF0EC;padding:4px 10px;border-radius:6px}
.btn-done{padding:10px 18px;border-radius:8px;border:none;background:#1E4A2E;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif}
.btn-done:disabled{background:#C8C0B8;cursor:not-allowed}
.card-footer{padding:14px 16px;background:#F4F1EA;display:flex;justify-content:flex-end}
.empty{text-align:center;padding:60px 20px;color:#9E9890}
.empty svg{width:40px;height:40px;stroke:#DDD7CE;fill:none;stroke-width:1.5;margin:0 auto 16px;display:block}
.lov{display:none;position:fixed;inset:0;background:rgba(244,241,234,.96);z-index:999;align-items:center;justify-content:center;flex-direction:column;gap:14px}
.lov.show{display:flex}
.spinner{width:28px;height:28px;border:2px solid #DDD7CE;border-top-color:#B08D57;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.lov-text{font-size:13px;color:#2A2A2A;font-weight:600}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#111111;color:#fff;padding:10px 18px;border-radius:8px;font-size:12px;font-weight:700;white-space:nowrap;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
.invalid{text-align:center;padding:60px 20px}
.invalid h2{font-family:Inter,sans-serif;font-size:24px;color:#7A2418;margin-bottom:12px}

</style>
</head>
<body>
<div class="lov" id="lov"><div class="spinner"></div><div class="lov-text" id="lovText">Se încarcă...</div></div>
<div class="toast" id="toast"></div>

<div class="hdr">
  <div>
    <div class="hdr-brand">SILESCO · Producție</div>
    <div class="hdr-title">Atelier Cusut</div>
    <div class="hdr-ws" id="wsName">—</div>
  </div>
  <button onclick="location.reload()" class="hdr-reload">↻ Reîncarcă</button>
</div>
<div id="annBanners"></div>

<div class="content" id="content">
  <div class="lov show" id="initLov"><div class="spinner"></div><div class="lov-text">Se verifică accesul...</div></div>
</div>

<div style="max-width:600px;margin:0 auto;padding:0 20px 40px">
  <div style="text-align:center;margin-bottom:12px">
    <button id="btnIstoric" onclick="loadIstoric()" style="padding:10px 20px;border-radius:8px;border:1px solid #DDD7CE;background:#fff;color:#5A5248;font-size:12px;font-weight:700;cursor:pointer;font-family:Inter,sans-serif;">
      📋 Istoric cusut (ultimele 3 luni)
    </button>
  </div>
  <div id="istoricList" style="background:#fff;border:1px solid #DDD7CE;border-radius:10px;overflow:hidden;display:none"></div>
</div>

<script>
const SURL='https://nprpwaxijtbjkxdhdxmq.supabase.co';
const SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5wcnB3YXhpanRiamt4ZGhkeG1xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5ODc3MzIsImV4cCI6MjA5NTU2MzczMn0.Ae8_C-3ke-KBTgIy9xcJZeDNFaR3Q9vTkoPxC6AbAg0';
const{createClient}=supabase;
const sb=createClient(SURL,SKEY);

let wsName='',wsToken='';

window.addEventListener('DOMContentLoaded',async()=>{
  const params=new URLSearchParams(window.location.search);
  const token=params.get('token');
  if(!token){showInvalid('Link invalid — lipsește token-ul.');return;}
  wsToken=token;
  // Verifică token
  const{data:ws,error}=await sb.from('workshop_tokens').select('workshop_name').eq('token',token).single();
  document.getElementById('initLov').style.display='none';
  if(error||!ws){showInvalid('Link invalid sau expirat. Contactează SILESCO.');return;}
  wsName=ws.workshop_name;
  document.getElementById('wsName').textContent=wsName.charAt(0).toUpperCase()+wsName.slice(1);
  loadAnnouncements(wsName);
  await loadOrders();
});

async function loadOrders(){
  showLov('Se încarcă comenzile...');
  const DONE_STATUSES=['cusut_gata','pregatit_lansat','in_talpuit','la_talpuit','gata','la_impachetat_talpuit','pregatit_livrare','finalizat'];

  // Pas 1: Găsim comenzile active
  const{data:orders}=await sb.from('orders')
    .select('id,order_no,status,delivery_date,sort_order,clients!orders_client_id_fkey(name,company_name)')
    .in('status',['la_croit','in_productie','fete_gata_cusut','la_cusut_extern','la_cusut'])
    .order('sort_order',{ascending:true,nullsFirst:false})
    .order('delivery_date',{ascending:true});
  const orderIds=(orders||[]).map(o=>o.id);
  if(!orderIds.length){
    hideLov();
    document.getElementById('content').innerHTML='<div class="empty"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg><div style="font-size:16px;font-weight:700;color:#111111;margin-bottom:8px">Nicio comandă activă!</div></div>';
    return;
  }

  // Pas 2: Găsim liniile pentru acest atelier
  const{data:lines}=await sb.from('order_lines')
    .select('id,product_id,free_model,color,ponytage,total_pairs,notes,production_status,order_id,products(code,name)')
    .ilike('workshop',wsName)
    .in('order_id',orderIds);

  // Atașăm datele comenzii la fiecare linie
  const EXCLUDE_STATUSES=['cusut_gata','pregatit_lansat','in_talpuit','la_talpuit','gata','la_impachetat_talpuit','pregatit_livrare','finalizat'];
  const pendingLines=(lines||[]).filter(l=>!EXCLUDE_STATUSES.includes(l.production_status));
  const orderMap={};
  (orders||[]).forEach(o=>orderMap[o.id]=o);
  pendingLines.forEach(l=>l.orders=orderMap[l.order_id]||null);
  hideLov();
  const content=document.getElementById('content');
  if(!pendingLines?.length){
    content.innerHTML='<div class="empty"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg><div style="font-size:16px;font-weight:700;color:#111111;margin-bottom:8px">Toate comenzile finalizate!</div><div style="font-size:13px">Nu mai aveți articole de cusut.</div></div>';
    return;
  }
  // Grupează pe comandă PĂSTRÂND ORDINEA din sort_order
  const byOrderMap={};
  pendingLines.forEach(l=>{
    const oid=l.order_id;
    if(!oid||!orderMap[oid])return;
    if(!byOrderMap[oid])byOrderMap[oid]={order:orderMap[oid],lines:[]};
    byOrderMap[oid].lines.push(l);
  });
  // Sortăm după sort_order din orders
  const orderedGroups=(orders||[])
    .filter(o=>byOrderMap[o.id])
    .map(o=>byOrderMap[o.id]);
  content.innerHTML=orderedGroups.map(g=>{
    const o=g.order;
    const cl=o.clients?.company_name||o.clients?.name||'Fără client';
    const dd=o.delivery_date?new Date(o.delivery_date).toLocaleDateString('ro-RO'):'—';
    const DONE=['cusut_gata','pregatit_lansat','in_talpuit','la_talpuit','gata','pregatit_livrare','finalizat'];
    const allDone=g.lines.every(l=>DONE.includes(l.production_status));
    return `<div class="card">
      <div class="card-header">
        <div class="order-no">${o.order_no||'—'}</div>
        <div class="client">${cl}</div>
        <div class="deadline">Termen: ${dd}</div>
      </div>
      ${g.lines.map(l=>{
        const mod=l.products?.code?'Art. '+l.products.code:l.free_model||'—';
        const entries=l.ponytage?Object.entries(l.ponytage).filter(([,q])=>q>0):[];
        const isDone=DONE.includes(l.production_status);
        const notesClean=l.notes?l.notes.replace(/\[[^\]]+\]\s*/g,'').replace(/\[Discount:[^\]]+\]\s*/,'').trim():'';
        return `<div class="art-row">
          <div class="art-info">
            <div class="art-name">${mod}</div>
            <div class="art-color">${l.color||'—'}</div>
            <div class="art-total">${l.total_pairs} perechi</div>
            <div class="pontaj">${entries.map(([s,q])=>`<span class="pchip">${s}×${q}</span>`).join('')}</div>
            ${notesClean?`<div style="font-size:11px;color:#8B6914;margin-top:4px;font-style:italic">${notesClean}</div>`:''}
          </div>
          <div class="art-status">
            ${isDone
              ?'<span class="status-done">✓ Cusut gata</span>'
              :`<button class="btn-done" onclick="markDone('${l.id}','${o.id}','${o.order_no}')">✓ Finalizat</button>`
            }
          </div>
        </div>`;
      }).join('')}
      ${allDone?`<div class="card-footer"><span style="font-size:12px;font-weight:700;color:#1E4A2E">✓ Toate articolele cusute</span></div>`:''}
    </div>`;
  }).join('');
}

async function markDone(lineId,orderId,orderNo){
  showLov('Se salvează...');
  await sb.from('order_lines').update({production_status:'cusut_gata'}).eq('id',lineId);
  // Actualizează și un flag pe comandă că atelierul a raportat
  await sb.from('orders').update({updated_at:new Date().toISOString()}).eq('id',orderId);
  hideLov();showToast('Marcat ca finalizat!');
  await loadOrders();
}

async function loadIstoric(){
  const btn=document.getElementById('btnIstoric');
  if(btn)btn.style.display='none';
  showLov('Se încarcă istoricul...');
  const acum3luni=new Date();
  acum3luni.setMonth(acum3luni.getMonth()-3);
  const{data:lines}=await sb.from('order_lines')
    .select('id,color,free_model,total_pairs,production_status,order_id,products(code,name),orders!order_lines_order_id_fkey(order_no,delivery_date,clients!orders_client_id_fkey(name,company_name))')
    .ilike('workshop',wsName)
    .in('production_status',['cusut_gata','la_talpuit','gata'])
    .gte('created_at',acum3luni.toISOString())
    .order('created_at',{ascending:false})
    .limit(30);
  hideLov();
  const el=document.getElementById('istoricList');
  if(!el)return;
  if(!lines||!lines.length){el.innerHTML='<div style="font-size:12px;color:#9E9890;text-align:center;padding:16px">Niciun articol în ultimele 3 luni</div>';return;}
  el.style.display='block';
  el.innerHTML=lines.map(l=>{
    const mod=l.products?.code?'Art. '+l.products.code:l.free_model||'—';
    const o=l.orders;
    const cl=o?.clients?.company_name||o?.clients?.name||'—';
    return '<div style="padding:10px 14px;border-bottom:1px solid #EDE8DF">'
      +'<div style="font-size:12px;font-weight:700;color:#111111">'+mod+' · '+(l.color||'—')+' · '+l.total_pairs+' per.</div>'
      +'<div style="font-size:10px;color:#5A5248;margin-top:2px">'+(o?.order_no||'—')+' · '+cl+'</div>'
      +'</div>';
  }).join('');
}

function showInvalid(msg){
  document.getElementById('content').innerHTML=`<div class="invalid"><h2>⚠ Acces invalid</h2><p style="font-size:14px;color:#5A5248">${msg}</p></div>`;
}
function showLov(t){document.getElementById('lovText').textContent=t||'Se încarcă...';document.getElementById('lov').classList.add('show');}
function hideLov(){document.getElementById('lov').classList.remove('show');}
function showToast(m){const e=document.getElementById('toast');e.textContent=m;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),2500);}

// ── ANNOUNCEMENTS ──
const _dismissedAnns=new Set();
async function loadAnnouncements(dept){
  try{
    const{data}=await sb.from('announcements').select('*').eq('active',true).order('created_at',{ascending:false});
    const el=document.getElementById('annBanners');if(!el)return;
    const COLORS={informare:['#E8EFF6','#2F4A63'],atentionare:['#FBF3E0','#7A5C28'],urgent:['#FBE9E7','#9C3A2B']};
    const relevant=(data||[]).filter(a=>(a.departments||[]).includes(dept)&&!_dismissedAnns.has(a.id));
    el.innerHTML=relevant.map(a=>{
      const c=COLORS[a.type]||COLORS.informare;
      return '<div id="ann_'+a.id+'" style="background:'+c[0]+';border-bottom:2px solid '+c[1]+';padding:8px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px">'
        +'<div style="font-size:13px;color:'+c[1]+';font-weight:600;flex:1">'+a.message+'</div>'
        +'<button onclick="_dismissedAnns.add(\''+a.id+'\');document.getElementById(\'ann_'+a.id+'\').remove()" style="background:none;border:none;color:'+c[1]+';font-size:18px;cursor:pointer;padding:0 4px;line-height:1">×</button>'
        +'</div>';
    }).join('');
  }catch(e){console.warn('Ann:',e);}
}
</script>
</body>
</html>
